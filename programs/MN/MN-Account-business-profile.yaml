        description: >
          Relevant prior education, certifications, or training programs (MBA, executive education, industry certifications).
        category: "Mentoring Context"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

      - name: natureOfAssistanceSought
        type: multiEnum
        label: "Nature of Assistance Sought"
        description: >
          The mentoring topics the client wants help with. Mirrors SBA Form 641 question 30. Drives mentor matching.
        category: "Mentoring Context"
        required: false
        options:
          - "Start-up Assistance"
          - "Business Plan"
          - "Financing and Capital"
          - "Managing a Business"
          - "Human Resources and Managing Employees"
          - "Customer Relations"
          - "Business Accounting and Budget"
          - "Cash Flow Management"
          - "Tax Planning"
          - "Marketing and Sales"
          - "Government Contracting (including certifications)"
          - "Franchising"
          - "Buy or Sell a Business"
          - "Technology and Computers"
          - "E-Commerce"
          - "Legal Issues"
          - "International Trade"
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

      - name: languagePreference
        type: enum
        label: "Preferred Language for Mentoring"
        description: >
          Language the client prefers for mentoring sessions.
        category: "Mentoring Context"
        required: false
        options:
          - "English"
          - "Spanish"
          - "Other"
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

      - name: accessibilityNeeds
        type: text
        label: "Accessibility Needs"
        description: >

version: '1.0'
content_version: 1.0.0
description: Audit snapshot of Engagement captured from https://crm-test.clevelandbusinessmentors.org/ on 2026-05-23T06:01:40Z.
entities:
  Engagement:
    action: create
    type: Base
    labelSingular: Engagement
    labelPlural: Engagements
    stream: true
    fields:
    - name: engagementStatus
      type: enum
      label: Engagement Status
      required: true
      default: Submitted
      audited: true
      options:
      - Submitted
      - Declined
      - Pending Acceptance
      - Assigned
      - Active
      - On-Hold
      - Dormant
      - Inactive
      - Abandoned
      - Completed
      style:
        Submitted: info
        Declined: danger
        Pending Acceptance: warning
        Assigned: primary
        Active: success
        On-Hold: warning
        Abandoned: danger
        Completed: success
      maxLength: 100
    - name: meetingCadence
      type: enum
      label: Meeting Cadence
      options:
      - Weekly
      - Bi-Weekly
      - Monthly
      - As Needed
      maxLength: 100
    - name: holdEndDate
      type: date
      label: Hold End Date
    - name: mentoringFocusAreas
      type: multiEnum
      label: Mentoring Focus Areas
      options:
      - Accounting & Tax Services
      - Advertising, Design, & Marketing
      - Agriculture
      - Animal & Veterinary Services
      - Architecture, Engineering, & Related Services
      - Arts, Entertainment, & Recreation
      - Auto Repair & Mechanic
      - Beauty, Cosmetics & Salon Services
      - Business Consulting & Coaching
      - Childcare
      - Commercial & Residential Services
      - Construction
      - Counseling & Therapy
      - Distribution & Transportation of Goods
      - Education
      - Farming & Livestock
      - Fine Arts, Artisan, & Craft Work
      - Fishing & Hunting
      - Food & Beverage
      - Forestry
      - Funeral & Death Care Services
      - Information Technology
      - Manufacturing
      - Media & Publishing
      - Mining, Quarry, & Utilities
      - Nonprofit
      - Personal Care Services
      - Photography & Video Services
      - Professional Services
      - Public Relations & Communications
      - Real Estate
      - Recruiting & Staffing
      - Rental & Leasing
      - Restaurant & Bar
      - Retail
      - Social Assistance & Family Services
      - Transportation
      - Travel, Hospitality, & Tourism
      - Warehousing
      - Waste Management & Disposal
      - Website Development
      - Wellness, Healthcare, & Home Health
    - name: mentoringNeedsDescription
      type: wysiwyg
      label: Mentoring Needs Description
      required: true
    - name: engagementNotes
      type: wysiwyg
      label: Engagement Notes
    - name: totalSessions
      type: int
      label: Total Sessions
      readOnly: true
    - name: totalSessionsLast30Days
      type: int
      label: Total Sessions (Last 30 Days)
      readOnly: true
    - name: lastSessionDate
      type: date
      label: Last Session Date
      readOnly: true
    - name: totalSessionHours
      type: float
      label: Total Session Hours
      readOnly: true
    - name: nextSessionDateTime
      type: datetime
      label: Next Session Date/Time
    - name: closeDate
      type: date
      label: Close Date
      readOnly: true
    - name: closeReason
      type: enum
      label: Close Reason
      options:
      - ''
      - Goals Achieved
      - Client Withdrew
      - Inactive / No Response
      - Other
      style:
        Goals Achieved: success
        Client Withdrew: warning
      maxLength: 100
    - name: newBusinessStarted
      type: bool
      label: New Business Started
    - name: newLocationOpened
      type: bool
      label: New Location Opened
    - name: significantRevenueIncrease
      type: bool
      label: Significant Revenue Increase
    - name: revenueIncreasePercentage
      type: float
      label: Revenue Increase Percentage
    - name: significantEmploymentIncrease
      type: bool
      label: Significant Employment Increase
    - name: employmentIncreasePercentage
      type: float
      label: Employment Increase Percentage
    layout:
      detail:
        panels:
        - label: Lifecycle and Status
          rows:
          - - name
          - - engagementStatus
            - holdEndDate
          - - meetingCadence
            - engagementClient
          - - primaryEngagementContact
            - referringPartner
          - - requestedMentor
            - mentorProfile
          - - clientOrganization
            - description
        - label: Mentoring Context
          rows:
          - - mentoringFocusAreas
            - null
          - - mentoringNeedsDescription
        - label: Notes
          rows:
          - - engagementNotes
        - label: Session Analytics
          tabBreak: true
          tabLabel: Analytics
          rows:
          - - totalSessions
            - totalSessionsLast30Days
          - - lastSessionDate
            - totalSessionHours
          - - nextSessionDateTime
            - null
        - label: Closure
          tabBreak: true
          tabLabel: Engagement Outcome
          rows:
          - - closeDate
            - closeReason
        - label: Engagement Outcomes
          tabLabel: Engagement Outcome
          rows:
          - - newBusinessStarted
            - newLocationOpened
          - - significantRevenueIncrease
            - revenueIncreasePercentage
          - - significantEmploymentIncrease
            - employmentIncreasePercentage
      list:
        columns:
        - field: name
          width: 28
        - field: engagementStatus
          width: 14
        - field: primaryEngagementContact
          width: 16
        - field: meetingCadence
          width: 10
        - field: lastSessionDate
          width: 12
        - field: nextSessionDateTime
          width: 14
        - field: totalSessions
          width: 10

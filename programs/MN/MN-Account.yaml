version: "1.0"
content_version: "1.0.0"
description: >
  Mentoring (MN) domain — custom field additions to the native
  Account entity for Client Organization records. Six Client-side
  fields: organizationType, companyType, businessStage,
  industrySector, industrySubsector, clientNotes; four Account-
  level external-reference fields surfacing partner/sponsor
  context on the Account record: partnerType,
  partnerPrimaryContact, sponsorType, sponsorPrimaryContact. The
  industrySector value list is the same 20 NAICS sector titles used
  by Mentor Contact.industrySectors per MR-Y9-EXC-001 (cross-entity
  alignment requirement). The industrySubsector dependent-filter
  value list (~100 subsectors filtered by sector) is deferred to
  later implementation — see EXCEPTIONS.md MN-Y9-EXC-005 and
  MANUAL-CONFIG.md MN-MC-OL-002.

  This file is generated at the unattended Phase 9 multi-domain
  run's discretion: the run prompt explicitly listed three MN
  outputs (Contact, Engagement, Session) without naming an Account
  output, but the MN Domain PRD requires these Client Organization
  custom fields on Account and they are MN-domain-owned per the
  Account Entity PRD's "Domains: MN" annotations on each field.
  Generating the file is the conservative choice that keeps the MN
  PRD covered. See EXCEPTIONS.md MN-Y9-EXC-006 for the scope-
  deviation record.

  SPLIT-NOTE: MN-Sponsor.yaml and MN-Partner.yaml carry the
  detailed accountType-conditional fields for Sponsor and Partner
  records (level/amount/dates/notes). THIS file carries a small
  set of Account-level "external reference" fields — partnerType,
  partnerPrimaryContact, sponsorType, sponsorPrimaryContact —
  that surface the partner/sponsor classification and primary
  contact directly on the Account detail layout. These four are
  intentionally lightweight and parallel to MN-Partner.yaml /
  MN-Sponsor.yaml fields; the detailed fields in those sibling
  files exist on the Account entity post-deploy but are NOT placed
  on the YAML-managed detail layout (EspoCRM stores one detail
  layout per entity; only this file writes it). The detailed
  fields surface either via the EspoCRM Layout Manager (operator
  post-deploy step) or once cross-file layout aggregation lands in
  the deploy engine.

  The partnerPrimaryContact and sponsorPrimaryContact fields are
  declared as varchar today as a placeholder. The methodologically
  correct shape is a manyToOne relationship to Contact (rendered
  as a Contact link field in EspoCRM); the YAML schema does not
  allow `type: link` so the relationship form would live in the
  top-level `relationships:` block. Deferred to a follow-up after
  the MN Domain PRD specifies the primary-contact link semantics.

# Source: Mentoring Domain Product Requirements Document v1.0
#         (04-01-26), Section 4 (Client Organization entity).
#         Account Entity Product Requirements Document v1.8
#         Section 3.3 (Mentoring-domain fields). MN-INTAKE v2.1.

entities:

  Account:
    description: >
      Native Company-type entity. The single repository for all
      organizations known to CBM. This file defines the MN-owned
      custom fields needed for Client Organization records
      (created at MN-INTAKE) plus four Account-level external-
      reference fields for partner/sponsor classification. The
      accountType discriminator is declared in CR-Account.yaml;
      this file does not redefine it but depends on the "Client",
      "Partner", and "Sponsor" values being present in its option
      list. Native fields name (Business Name — MN-INTAKE-DAT-001),
      website (MN-INTAKE-DAT-002), and billingAddress composite
      (MN-INTAKE-DAT-003) are inherited from the Company entity
      type and require no YAML declaration. See Account Entity PRD
      v1.8 Section 3.3.

    fields:

      # --- Section 3.3 — Mentoring-Domain Client Fields ---

      - name: organizationType
        type: enum
        label: "Organization Type"
        description: >
          Whether the client organization operates as a for-profit
          business or a nonprofit. Drives funder reporting
          categories. Visible only when accountType has Client.
          See PRD MN-INTAKE-DAT-004.
        category: "Client Profile"
        required: false
        options:
          - "For-Profit"
          - "Non-Profit"

      - name: companyType
        type: multiEnum
        label: "Company Type"
        description: >
          Whether the client organization operates as a for-profit
          business or a nonprofit. Drives funder reporting
          categories. Visible only when accountType has Client.
          See PRD MN-INTAKE-DAT-004.
        category: "Company Information"
        required: false
        options:
          - ""
          - "Client"
          - "Sponsor"
          - "Partner"
          - "Other"

      - name: businessStage
        type: enum
        label: "Business Stage"
        description: >
          The stage of business development the client organization
          is in. Used for mentor matching and funder reporting.
          Required at MN-INTAKE per the data table in MN Domain PRD
          Section 4. Visible only when accountType has Client. See
          PRD MN-INTAKE-DAT-005.
        category: "Client Profile"
        required: false
        requiredWhen:
          - { field: accountType, op: contains, value: "Client" }
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }
        options:
          - "Pre-Startup"
          - "Startup"
          - "Early Stage"
          - "Growth Stage"
          - "Established"

      - name: industrySector
        type: enum
        label: "Industry Sector"
        description: >
          Primary NAICS top-level industry sector. 20 standard
          United States Census Bureau NAICS two-digit sector titles
          per MR-Y9-EXC-001 (cross-entity alignment requirement —
          values match Mentor Contact.industrySectors). Drives the
          Industry Subsector dependent filter. Visible only when
          accountType has Client. See PRD MN-INTAKE-DAT-006.
        category: "Client Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }
        options:
          - "Agriculture, Forestry, Fishing and Hunting"
          - "Mining, Quarrying, and Oil and Gas Extraction"
          - "Utilities"
          - "Construction"
          - "Manufacturing"
          - "Wholesale Trade"
          - "Retail Trade"
          - "Transportation and Warehousing"
          - "Information"
          - "Finance and Insurance"
          - "Real Estate and Rental and Leasing"
          - "Professional, Scientific, and Technical Services"
          - "Management of Companies and Enterprises"
          - "Administrative and Support and Waste Management"
          - "Educational Services"
          - "Health Care and Social Assistance"
          - "Arts, Entertainment, and Recreation"
          - "Accommodation and Food Services"
          - "Other Services (except Public Administration)"
          - "Public Administration"

      - name: industrySubsector
        type: enum
        label: "Industry Subsector"
        description: >
          Specific industry subsector within the selected Industry
          Sector. Dependent-filter behavior (~100 subsectors filtered
          by parent sector) is configured post-deployment because
          the YAML schema does not express dependent enums — see
          MANUAL-CONFIG.md MN-MC-DD-002. Empty options list at
          Phase 9 per EXCEPTIONS.md MN-Y9-EXC-005. Visible only when
          accountType has Client. See PRD MN-INTAKE-DAT-007.
        category: "Client Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }
        # Empty options — deferred per EXCEPTIONS.md MN-Y9-EXC-005.
        # Validator accepts via optionsDeferred:true; operator
        # populates the ~100-value taxonomy and dependent-filter
        # configuration post-deploy per MANUAL-CONFIG.md MN-MC-DD-002.
        optionsDeferred: true
        options: []

      - name: clientNotes
        type: wysiwyg
        label: "Client Notes"
        description: >
          Rich-text notes specific to the client relationship.
          Field-level access control restricted to Client
          Administrator and above; hidden from mentors per Account
          Entity PRD v1.8 Implementation Note. Configured
          post-deployment — see MANUAL-CONFIG.md MN-MC-AC-002.
          Visible only when accountType has Client.
        category: "Client Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

      # --- Partner Profile External-Reference Fields ---
      # Lightweight summary fields visible on the Account detail
      # layout to give CBM staff at-a-glance visibility into the
      # partner classification and primary contact for any Account
      # whose accountType has Partner. The detailed partner data
      # (start date, agreement date, contact cadence, notes) lives
      # in MN-Partner.yaml. These two fields exist on Account so
      # the Partner Profile layout panel has content the validator
      # can resolve via category lookup (file-scoped). Name choices:
      # `partnerType` (rather than `partnershipType`) keeps these
      # distinct from MN-Partner.yaml's `partnershipType` field to
      # avoid duplicate field declarations on the Account entity.

      - name: partnerType
        type: enum
        label: "Partnership Type"
        description: >
          Top-level partnership classification surfaced on the
          Account record. Mirrors the partnership-type taxonomy in
          MN-Partner.yaml; treat this as the Account-level summary
          and the MN-Partner.yaml partnershipType as the detail
          record. Visible only when accountType has Partner.
        category: "Partner Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Partner" }
        options:
          - "Referral Partner"
          - "Training Partner"
          - "Community Partner"
          - "Service Partner"
          - "Funding Partner"

      - name: partnerPrimaryContact
        type: varchar
        label: "Partnership Primary Contact"
        description: >
          Name (or email) of the primary Contact representing this
          Account in its Partner relationship with CBM. Declared as
          varchar today as a placeholder; the methodologically
          correct shape is a manyToOne relationship to Contact
          rendered as a Contact link field in EspoCRM — the YAML
          schema does not allow `type: link`, so a future revision
          would move this to a top-level `relationships:` block.
          Visible only when accountType has Partner.
        category: "Partner Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Partner" }

      # --- Sponsor Profile External-Reference Fields ---
      # Same shape as the Partner Profile reference block. The
      # detailed sponsor data (level, pledge amount, dates, notes)
      # lives in MN-Sponsor.yaml. These two fields exist on Account
      # so the Sponsor Profile layout panel has content the
      # validator can resolve via category lookup.

      - name: sponsorType
        type: enum
        label: "Sponsor Type"
        description: >
          Top-level sponsor classification — the kind of
          organization providing sponsorship. Distinct from
          MN-Sponsor.yaml's sponsorshipLevel, which captures the
          recognition tier. Visible only when accountType has
          Sponsor.
        category: "Sponsor Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Sponsor" }
        options:
          - "Corporate"
          - "Foundation"
          - "Government"
          - "Individual"
          - "Other"

      - name: sponsorPrimaryContact
        type: varchar
        label: "Sponsor Primary Contact"
        description: >
          Name (or email) of the primary Contact representing this
          Account in its Sponsor relationship with CBM. Same
          placeholder/varchar caveat as partnerPrimaryContact — a
          proper Contact link belongs in a future `relationships:`
          revision. Visible only when accountType has Sponsor.
        category: "Sponsor Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Sponsor" }

    layout:

      detail:
        panels:

          - label: "Client Profile"
            description: >
              Mentoring-domain client organization profile fields.
              Visible only when accountType has Client. Source:
              Account Entity PRD v1.8 Section 3.3 and Mentoring
              Domain PRD v1.0 Section 4 (Client Organization).
            visibleWhen:
              - { field: accountType, op: contains, value: "Client" }
            tabs:
              - label: "Client Profile"
                category: "Client Profile"

          - label: "Partner Profile"
            description: >
              Account-level external-reference fields for partner
              organizations. Two fields — partnerType,
              partnerPrimaryContact — surface the partnership
              classification and primary contact on the Account
              detail layout. Detailed partner data (start date,
              agreement date, contact cadence, notes) lives in
              MN-Partner.yaml and is not placed on this layout.
              Visible only when accountType has Partner.
            visibleWhen:
              - { field: accountType, op: contains, value: "Partner" }
            tabs:
              - label: "Partner Profile"
                category: "Partner Profile"

          - label: "Sponsor Profile"
            description: >
              Account-level external-reference fields for sponsor
              organizations. Two fields — sponsorType,
              sponsorPrimaryContact — surface the sponsor
              classification and primary contact on the Account
              detail layout. Detailed sponsor data (level, pledge
              amount, dates, notes) lives in MN-Sponsor.yaml and is
              not placed on this layout. Visible only when
              accountType has Sponsor.
            visibleWhen:
              - { field: accountType, op: contains, value: "Sponsor" }
            tabs:
              - label: "Sponsor Profile"
                category: "Sponsor Profile"

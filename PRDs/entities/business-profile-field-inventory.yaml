  - id: mentoring-context
    name: "Mentoring Context and Intangibles"
    rationale: >
      Captures the soft context that makes mentoring effective —
      goals, challenges, prior experience with mentoring, and
      preferences. Aligned with SCORE practice and SBA Form 641
      question 30 (nature of counseling sought).
    fields:

      - name: topBusinessGoalsNext12Months
        type: text
        label: "Top Business Goals — Next 12 Months"
        sensitivity: moderate
        phase: intake
        status: candidate-new

      - name: currentTopChallenges
        type: text
        label: "Current Top Challenges"
        sensitivity: moderate
        phase: intake
        status: candidate-new

      - name: priorMentoringReceived
        type: bool
        label: "Previously Received Business Mentoring"
        sensitivity: routine
        phase: intake
        status: candidate-new

      - name: priorMentoringSources
        type: multiEnum
        label: "Prior Mentoring Sources"
        sensitivity: routine
        phase: first-session
        status: candidate-new
        options:
          - "SCORE"
          - "Small Business Development Center (SBDC)"
          - "Women's Business Center"
          - "Veterans Business Outreach Center"
          - "Minority Business Development Agency"
          - "Private Coach or Consultant"
          - "Industry Association"
          - "Other Nonprofit"
          - "Other"

      - name: priorBusinessTrainingNotes
        type: text
        label: "Prior Business Training or Education"
        sensitivity: routine
        phase: first-session
        status: candidate-new
        rationale: >
          Captures relevant prior education, certifications, or
          training programs (MBA, executive education, industry
          certifications, etc.).

      - name: natureOfAssistanceSought
        type: multiEnum
        label: "Nature of Assistance Sought"
        sensitivity: routine
        phase: intake
        status: candidate-new
        options:
          - "Start-up Assistance"
          - "Business Plan"
          - "Financing and Capital"
          - "Managing a Business"
          - "Human Resources and Managing Employees"
          - "Customer Relations"
          - "Business Accounting and Budget"
          - "Cash Flow Management"
          - "Tax Planning"
          - "Marketing and Sales"
          - "Government Contracting (including certifications)"
          - "Franchising"
          - "Buy or Sell a Business"
          - "Technology and Computers"
          - "E-Commerce"
          - "Legal Issues"
          - "International Trade"
        rationale: >
          Directly mirrors SBA Form 641 question 30. Enables
          matching to mentors with relevant expertise.
        source: "SBA Form 641 question 30"

      - name: languagePreference
        type: enum
        label: "Preferred Language for Mentoring"
        sensitivity: routine
        phase: intake
        status: candidate-new
        options:
          - "English"
          - "Spanish"
          - "Other"

      - name: accessibilityNeeds
        type: text
        label: "Accessibility Needs"
        sensitivity: sensitive
        phase: intake
        status: candidate-new

      - name: willingToProvideTestimonial
        type: bool
        label: "Willing to Provide a Testimonial Later"
        sensitivity: routine
        phase: ongoing
        status: candidate-new

      - name: willingToParticipateInCbmEvents
        type: bool
        label: "Willing to Participate in CBM Events"
        sensitivity: routine
        phase: ongoing
        status: candidate-new

      - name: businessProfileLastReviewed
        type: date
        label: "Business Profile Last Reviewed"
        sensitivity: routine
        phase: ongoing
        status: candidate-new
        rationale: >
          Date the assigned mentor most recently reviewed and
          updated the Client Business Profile fields with the
          client. Supports a saved-view filter that surfaces
          records older than N months for periodic-review nudges.
          Many fields in this profile (currentlyHiring,
          currentlySeekingCapital, bookkeepingStatus, revenueTrend,
          and similar state fields) drift month over month; this
          field provides the freshness signal mentors and
          administrators need to keep the record current. Added
          in inventory v0.2.0 / PRD v1.11 to close F4 from the
          pre-Phase-8 review pass.

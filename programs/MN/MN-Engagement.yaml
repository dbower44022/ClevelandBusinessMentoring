version: "1.0"
content_version: "1.0.1"
description: >
  Mentoring (MN) domain — Engagement custom entity definition, plus
  the Engagement relationships to Account (Client Organization),
  Contact (Assigned Mentor, Primary Engagement Contact, Engagement
  Contacts, Additional Mentors, Requested Mentor, Referring Partner),
  and Session (oneToMany). 24 custom fields organized into seven
  panels driven by engagementStatus visibility rules. Owned primarily
  by the MN domain; one CR-contributed field (referringPartner)
  carries the CR-PARTNER-MANAGE referral attribution per ENG entity
  PRD v1.3 Section 3.7. Workflow-updated roll-up fields (totalSessions,
  totalSessionsLast30Days, lastSessionDate, totalSessionHours,
  nextSessionDateTime) are declared as `formula:` aggregate where
  the v1.1 schema can express the calculation, and as
  `externallyPopulated: true` (with MANUAL-CONFIG entry) where the
  computation requires a workflow trigger that is not expressible
  in the v1.1 workflow vocabulary. See EXCEPTIONS.md and
  MANUAL-CONFIG.md.

  v1.0.1 (05-05-26) — corrections triggered by the 05-05-26
  verification pass against the Mentoring Domain PRD: (a) added
  engagementRequestedMentor relationship (manyToOne to Contact)
  capturing the optional intake-form preferred-mentor selection per
  MN-INTAKE-DAT-026 / MN-MATCH-REQ-009, structurally parallel to
  engagementAssignedMentor; (b) relaxed meetingCadence from
  required:true to required:false because the field is set by the
  mentor after the first session and the intake flow cannot populate
  it at Engagement creation time. Workflow validation that
  meetingCadence is populated before the Assigned-to-Active
  transition is enforced post-deployment per MANUAL-CONFIG entry
  MN-MC-CR-006.

# Source: Mentoring Domain Product Requirements Document v1.0
#         (04-01-26), Section 4 Data Reference. Engagement Entity
#         Product Requirements Document v1.2 (04-15-26 23:20).
#         MN process documents MN-INTAKE v2.1, MN-MATCH v2.1,
#         MN-ENGAGE v2.3, MN-INACTIVE v1.2, MN-CLOSE v1.1.

entities:

  # ---------------------------------------------------------------
  # Custom entity — Engagement
  # ---------------------------------------------------------------

  Engagement:
    description: >
      A mentoring relationship linking a client organization to a
      volunteer mentor. Heaviest entity in the MN domain — fields
      are defined across all five MN process documents plus one
      CR-contributed referral field. Created at MN-INTAKE with
      engagementStatus = Submitted; transitions through 10
      lifecycle states governed by MN-INTAKE, MN-MATCH, MN-ENGAGE,
      MN-INACTIVE, and MN-CLOSE. Auto-generated name
      ("{Client Name}-{Mentor Name}-{Start Year}") is implemented
      via post-deployment automation per ENG-DEC-001 — see
      MANUAL-CONFIG.md MN-MC-AA-001. Activity stream enabled per
      Engagement Entity PRD Section 1. All five session roll-up
      fields update via a Session-status workflow per ENG-DEC-003 —
      v1.1 aggregate formulas express two of them; the other three
      depend on calendar-time scope (totalSessionsLast30Days) or
      cross-entity copy (nextSessionDateTime), surfaced in
      MANUAL-CONFIG.md MN-MC-AA-002 / MN-MC-AA-003. See
      EXCEPTIONS.md MN-Y9-EXC-002 (mentoringFocusAreas value list
      adopted from MR-Contact 42-value list per cross-entity
      alignment requirement) and MN-Y9-EXC-003 (closeReason value
      list deferred per ENG-ISS-002).
    action: create
    type: Base
    settings:
      labelSingular: "Engagement"
      labelPlural: "Engagements"
      stream: true
      disabled: false
      # Engagement.name is auto-generated by post-deployment automation
      # (ENG-DEC-001 — "{Client Name}-{Mentor Name}-{Start Year}"). Until
      # that automation is in place the user must supply name manually,
      # so leave autoPlaceName at the default true so the layout includes it.

    fields:

      # --- Section 3.1 — Lifecycle and Status ---

      - name: engagementStatus
        type: enum
        label: "Engagement Status"
        description: >
          The current lifecycle stage. Created at Submitted;
          transitions governed by all five MN processes. Drives
          panel and field visibility for closeDate, closeReason,
          holdEndDate, and outcome fields. Audited per ENG entity
          PRD Implementation Note 2. See PRD MN-INTAKE-DAT-017.
        category: "Lifecycle and Status"
        required: true
        audited: true
        default: "Submitted"
        options:
          - "Submitted"
          - "Declined"
          - "Pending Acceptance"
          - "Assigned"
          - "Active"
          - "On-Hold"
          - "Dormant"
          - "Inactive"
          - "Abandoned"
          - "Completed"
        style:
          "Submitted": "info"
          "Declined": "danger"
          "Pending Acceptance": "warning"
          "Assigned": "primary"
          "Active": "success"
          "On-Hold": "warning"
          "Dormant": "default"
          "Inactive": "default"
          "Abandoned": "danger"
          "Completed": "success"

      - name: meetingCadence
        type: enum
        label: "Meeting Cadence"
        description: >
          Expected meeting frequency. Set by the mentor after the
          first session. Drives MN-INACTIVE inactivity thresholds
          (Weekly = 7 days, Bi-Weekly = 14 days, Monthly = 30 days,
          As Needed = configurable system default per
          MN-INACTIVE-DEC). Required at the workflow level when the
          engagement transitions from Assigned to Active per
          MN-MC-CR-006 — not enforced as a field-level constraint
          so that intake-stage records can be created before a
          meeting cadence has been agreed on. See PRD
          MN-ENGAGE-DAT-014 and Engagement Entity PRD v1.3
          Implementation Note 10.
        category: "Lifecycle and Status"
        required: false
        options:
          - "Weekly"
          - "Bi-Weekly"
          - "Monthly"
          - "As Needed"

      - name: holdEndDate
        type: date
        label: "Hold End Date"
        description: >
          Expected end date for an On-Hold period. Conditionally
          required and visible when engagementStatus = On-Hold per
          ENG-DEC-006 and Section 5.1. Used by MN-INACTIVE as the
          comparison date for On-Hold engagements instead of
          lastSessionDate. See PRD MN-ENGAGE-DAT-036.
        category: "Lifecycle and Status"
        required: false
        requiredWhen:
          - { field: engagementStatus, op: equals, value: "On-Hold" }
        visibleWhen:
          - { field: engagementStatus, op: equals, value: "On-Hold" }

      # --- Section 3.2 — Mentoring Context ---

      - name: mentoringFocusAreas
        type: multiEnum
        label: "Mentoring Focus Areas"
        description: >
          Areas where the client seeks mentoring assistance. Primary
          matching criterion — compared against Mentor Contact's
          mentoringFocusAreas. The 42-value list is adopted from
          MR-Contact.yaml verbatim per the cross-entity alignment
          requirement (Engagement value set must match Mentor Contact
          value set). See PRD MN-INTAKE-DAT-018 and EXCEPTIONS.md
          MN-Y9-EXC-002 for the value list provenance.
        category: "Mentoring Context"
        required: false
        options:
          - "Accounting & Tax Services"
          - "Advertising, Design, & Marketing"
          - "Agriculture"
          - "Animal & Veterinary Services"
          - "Architecture, Engineering, & Related Services"
          - "Arts, Entertainment, & Recreation"
          - "Auto Repair & Mechanic"
          - "Beauty, Cosmetics & Salon Services"
          - "Business Consulting & Coaching"
          - "Childcare"
          - "Commercial & Residential Services"
          - "Construction"
          - "Counseling & Therapy"
          - "Distribution & Transportation of Goods"
          - "Education"
          - "Farming & Livestock"
          - "Fine Arts, Artisan, & Craft Work"
          - "Fishing & Hunting"
          - "Food & Beverage"
          - "Forestry"
          - "Funeral & Death Care Services"
          - "Information Technology"
          - "Manufacturing"
          - "Media & Publishing"
          - "Mining, Quarry, & Utilities"
          - "Nonprofit"
          - "Personal Care Services"
          - "Photography & Video Services"
          - "Professional Services"
          - "Public Relations & Communications"
          - "Real Estate"
          - "Recruiting & Staffing"
          - "Rental & Leasing"
          - "Restaurant & Bar"
          - "Retail"
          - "Social Assistance & Family Services"
          - "Transportation"
          - "Travel, Hospitality, & Tourism"
          - "Warehousing"
          - "Waste Management & Disposal"
          - "Website Development"
          - "Wellness, Healthcare, & Home Health"

      - name: mentoringNeedsDescription
        type: wysiwyg
        label: "Mentoring Needs Description"
        description: >
          The client's own description of what they are looking for
          in this engagement. Entered during MN-INTAKE; referenced
          during MN-MATCH and throughout the engagement. See PRD
          MN-INTAKE-DAT-019.
        category: "Mentoring Context"
        required: true

      # --- Section 3.3 — Notes ---

      - name: engagementNotes
        type: wysiwyg
        label: "Engagement Notes"
        description: >
          Private notes by the mentor. Restricted to administrators
          and assigned mentors per MN-ENGAGE-REQ-011 — never visible
          to clients. Field-level access control configured
          post-deployment (see MANUAL-CONFIG.md MN-MC-AC-001). Also
          documents On-Hold reasons and any closure narrative at the
          mentor's discretion. See PRD MN-ENGAGE-DAT-016.
        category: "Notes"
        required: false

      # --- Section 3.4 — Session Roll-Up Analytics ---

      - name: totalSessions
        type: int
        label: "Total Sessions"
        description: >
          Total count of completed sessions for this engagement.
          Aggregate roll-up of Session records via parent link with
          status = Completed. See PRD MN-ENGAGE-DAT-018 and
          ENG-DEC-003.
        category: "Session Analytics"
        required: false
        readOnly: true
        formula:
          type: aggregate
          function: count
          relatedEntity: Session
          via: parent
          where:
            - { field: status, op: equals, value: "Completed" }

      - name: totalSessionsLast30Days
        type: int
        label: "Total Sessions (Last 30 Days)"
        description: >
          Count of completed sessions in the last 30 days. Used by
          MN-INACTIVE for engagement health assessment and the
          Mentor — Inactivity Alert saved view. Aggregate roll-up
          using the Section 11 relative-date vocabulary
          (lastNDays:30). See PRD MN-ENGAGE-DAT-019 and ENG-DEC-003.
        category: "Session Analytics"
        required: false
        readOnly: true
        formula:
          type: aggregate
          function: count
          relatedEntity: Session
          via: parent
          where:
            - { field: status,    op: equals,             value: "Completed" }
            - { field: dateStart, op: greaterThanOrEqual, value: "lastNDays:30" }

      - name: lastSessionDate
        type: date
        label: "Last Session Date"
        description: >
          Date of the most recently completed session (max of
          dateStart on Session where status = Completed). Primary
          comparison date for MN-INACTIVE on Active engagements.
          See PRD MN-ENGAGE-DAT-020.
        category: "Session Analytics"
        required: false
        readOnly: true
        formula:
          type: aggregate
          function: max
          field: dateStart
          relatedEntity: Session
          via: parent
          where:
            - { field: status, op: equals, value: "Completed" }

      - name: totalSessionHours
        type: float
        label: "Total Session Hours"
        description: >
          Total hours of mentoring delivered. Sum of duration
          (minutes) across completed Session records. Stored as
          minutes here; the human-friendly hours conversion
          (divide by 60) lives in the report layer. See PRD
          MN-ENGAGE-DAT-021. ENG-DEC-003 frames this as a
          workflow-updated stored field for portability; v1.1
          schema's aggregate formula expresses the underlying
          calculation directly.
        category: "Session Analytics"
        required: false
        readOnly: true
        formula:
          type: aggregate
          function: sum
          field: duration
          relatedEntity: Session
          via: parent
          where:
            - { field: status, op: equals, value: "Completed" }

      - name: nextSessionDateTime
        type: datetime
        label: "Next Session Date/Time"
        description: >
          Scheduled date and time of the next meeting. Logically
          a copy of the Session.nextSessionDateTime value set on a
          completed Session. Resets the inactivity monitoring clock
          per MN-INACTIVE-REQ-007. The v1.1 workflow vocabulary
          does not express cross-entity field copy; populated by
          post-deployment workflow per MANUAL-CONFIG.md
          MN-MC-AA-003. Marked externallyPopulated so seed-data
          and verification skip it. See PRD MN-ENGAGE-DAT-022.
        category: "Session Analytics"
        required: false
        externallyPopulated: true

      # --- Section 3.5 — Closure ---

      - name: closeDate
        type: date
        label: "Close Date"
        description: >
          Date the engagement was formally closed. System-populated
          on transition to Declined, Abandoned, or Completed by
          post-deployment automation per ENG-DEC-001 Implementation
          Note 4 (see MANUAL-CONFIG.md MN-MC-AA-004). Retained on
          reopening. Visible when engagementStatus is one of the
          terminal closure states. See PRD MN-CLOSE-DAT-011.
        category: "Closure"
        required: false
        readOnly: true
        visibleWhen:
          - { field: engagementStatus, op: in, value: ["Declined", "Abandoned", "Completed"] }

      - name: closeReason
        type: enum
        label: "Close Reason"
        description: >
          Reason for closure. Required at Completed transition.
          "Inactive / No Response" is set automatically by
          MN-INACTIVE for Abandoned engagements per
          MN-INACTIVE-REQ-005 (post-deployment workflow — see
          MANUAL-CONFIG.md MN-MC-AA-005). Additional values may be
          added per ENG-ISS-002 (open). See PRD MN-CLOSE-DAT-012
          and EXCEPTIONS.md MN-Y9-EXC-003.
        category: "Closure"
        required: false
        requiredWhen:
          - { field: engagementStatus, op: equals, value: "Completed" }
        visibleWhen:
          - { field: engagementStatus, op: in, value: ["Declined", "Abandoned", "Completed"] }
        options:
          - "Goals Achieved"
          - "Client Withdrew"
          - "Inactive / No Response"
          - "Other"
        style:
          "Goals Achieved": "success"
          "Client Withdrew": "warning"
          "Inactive / No Response": "default"
          "Other": "default"

      # --- Section 3.6 — Engagement Outcomes ---

      - name: newBusinessStarted
        type: bool
        label: "New Business Started"
        description: >
          Whether the engagement helped the client start a new
          business. Accessible throughout the lifecycle but shown
          only at Completed per ENG-DEC Section 5.3 default. See
          PRD MN-CLOSE-DAT-013.
        category: "Engagement Outcomes"
        required: false
        visibleWhen:
          - { field: engagementStatus, op: equals, value: "Completed" }

      - name: newLocationOpened
        type: bool
        label: "New Location Opened"
        description: >
          Whether the engagement resulted in a new business
          location. See PRD MN-CLOSE-DAT-014.
        category: "Engagement Outcomes"
        required: false
        visibleWhen:
          - { field: engagementStatus, op: equals, value: "Completed" }

      - name: significantRevenueIncrease
        type: bool
        label: "Significant Revenue Increase"
        description: >
          Whether the engagement resulted in a significant revenue
          increase. Independent of revenueIncreasePercentage —
          both may be populated. See PRD MN-CLOSE-DAT-015.
        category: "Engagement Outcomes"
        required: false
        visibleWhen:
          - { field: engagementStatus, op: equals, value: "Completed" }

      - name: revenueIncreasePercentage
        type: float
        label: "Revenue Increase Percentage"
        description: >
          Percentage increase in revenue. Independent of the
          significantRevenueIncrease yes/no field. See PRD
          MN-CLOSE-DAT-016.
        category: "Engagement Outcomes"
        required: false
        visibleWhen:
          - { field: engagementStatus, op: equals, value: "Completed" }

      - name: significantEmploymentIncrease
        type: bool
        label: "Significant Employment Increase"
        description: >
          Whether the engagement resulted in a significant
          employment increase. See PRD MN-CLOSE-DAT-017.
        category: "Engagement Outcomes"
        required: false
        visibleWhen:
          - { field: engagementStatus, op: equals, value: "Completed" }

      - name: employmentIncreasePercentage
        type: float
        label: "Employment Increase Percentage"
        description: >
          Percentage increase in employees. Independent of the
          significantEmploymentIncrease yes/no field. See PRD
          MN-CLOSE-DAT-018.
        category: "Engagement Outcomes"
        required: false
        visibleWhen:
          - { field: engagementStatus, op: equals, value: "Completed" }

      # --- Section 3.7 — Referral Attribution (CR-contributed) ---

      # Note: referringPartner is declared in the relationships:
      # block as the engagementReferringPartner relationship's link
      # on the Engagement side. Per the schema rule, type: link is
      # not a valid field type — link relationships go exclusively
      # in the relationships: block. Field-level metadata
      # (description, category) does not propagate onto link
      # records via the deploy pipeline; layout placement is
      # handled by the engagement layout below.

    # --- Saved Views (operational filters used by MN processes) ---

    savedViews:

      - id: engagement-submitted
        name: "Engagement — Submitted Applications"
        description: >
          Engagement records at Submitted status — the dedicated
          view per MN-INTAKE-REQ-004 used by the Client
          Administrator during intake review.
        columns: [name, mentoringNeedsDescription, engagementStatus, createdAt]
        filter:
          - { field: engagementStatus, op: equals, value: "Submitted" }
        orderBy: { field: createdAt, direction: asc }

      - id: engagement-pending-acceptance
        name: "Engagement — Pending Mentor Acceptance"
        description: >
          Engagement records at Pending Acceptance status — used by
          the Client Assignment Coordinator to track the acceptance
          window and follow up on unresponsive nominees per
          MN-MATCH-REQ-005.
        columns: [name, engagementStatus, modifiedAt]
        filter:
          - { field: engagementStatus, op: equals, value: "Pending Acceptance" }
        orderBy: { field: modifiedAt, direction: asc }

      - id: engagement-active
        name: "Engagement — Active"
        description: >
          All engagements currently at Active status — the primary
          working view for mentors and the Client Administrator.
        columns: [name, engagementStatus, meetingCadence, lastSessionDate, nextSessionDateTime, totalSessions]
        filter:
          - { field: engagementStatus, op: equals, value: "Active" }
        orderBy: { field: lastSessionDate, direction: asc }

      - id: engagement-dormant-inactive
        name: "Engagement — Dormant / Inactive"
        description: >
          Engagements at Dormant or Inactive status. Used by the
          Client Administrator and Mentor Administrator per
          MN-INACTIVE-REQ-008.
        columns: [name, engagementStatus, meetingCadence, lastSessionDate, totalSessionsLast30Days]
        filter:
          - { field: engagementStatus, op: in, value: ["Dormant", "Inactive"] }
        orderBy: { field: lastSessionDate, direction: asc }

      - id: engagement-on-hold
        name: "Engagement — On-Hold"
        description: >
          Engagements at On-Hold status with their planned hold end
          date for tracking expected resumption.
        columns: [name, holdEndDate, lastSessionDate]
        filter:
          - { field: engagementStatus, op: equals, value: "On-Hold" }
        orderBy: { field: holdEndDate, direction: asc }

      - id: engagement-completed
        name: "Engagement — Completed (with Outcomes)"
        description: >
          Completed engagements, ordered by closeDate descending.
          Used for outcome reporting and analytics.
        columns: [name, closeDate, closeReason, totalSessions, totalSessionHours]
        filter:
          - { field: engagementStatus, op: equals, value: "Completed" }
        orderBy: { field: closeDate, direction: desc }

    layout:

      detail:
        panels:

          - label: "Lifecycle and Status"
            description: >
              Engagement lifecycle stage, meeting cadence, and the
              On-Hold-only Hold End Date. Source: Engagement Entity
              PRD v1.2 Sections 3.1 and 6 (Overview/On-Hold).
            tabs:
              - label: "Lifecycle and Status"
                category: "Lifecycle and Status"

          - label: "Mentoring Context"
            description: >
              What the client seeks from the engagement. Set during
              MN-INTAKE; referenced by MN-MATCH. Source: Engagement
              Entity PRD v1.2 Section 3.2.
            tabs:
              - label: "Mentoring Context"
                category: "Mentoring Context"

          - label: "Session Analytics"
            description: >
              Read-only roll-up analytics computed from linked
              Session records. Source: Engagement Entity PRD v1.2
              Section 3.4.
            tabs:
              - label: "Session Analytics"
                category: "Session Analytics"

          - label: "Notes"
            description: >
              Private mentor notes — restricted to administrators
              and assigned mentors per MN-ENGAGE-REQ-011 (field-
              level access control configured post-deployment).
              Source: Engagement Entity PRD v1.2 Section 3.3.
            tabs:
              - label: "Notes"
                category: "Notes"

          - label: "Closure"
            description: >
              Close date and close reason — visible only when the
              engagement has reached a terminal status. Source:
              Engagement Entity PRD v1.2 Sections 3.5 and 5.2.
            visibleWhen:
              - { field: engagementStatus, op: in, value: ["Declined", "Abandoned", "Completed"] }
            tabs:
              - label: "Closure"
                category: "Closure"

          - label: "Engagement Outcomes"
            description: >
              Outcome metrics prompted at closure. Visible only at
              Completed status per Engagement Entity PRD v1.2
              Section 5.3 default. Source: Engagement Entity PRD
              v1.2 Section 3.6.
            visibleWhen:
              - { field: engagementStatus, op: equals, value: "Completed" }
            tabs:
              - label: "Engagement Outcomes"
                category: "Engagement Outcomes"

      list:
        columns:
          - field: name
            width: 28
          - field: engagementStatus
            width: 14
          - field: meetingCadence
            width: 10
          - field: lastSessionDate
            width: 12
          - field: nextSessionDateTime
            width: 14
          - field: totalSessions
            width: 10
          - field: closeDate
            width: 12

# ---------------------------------------------------------------
# Relationships — Engagement is the central MN entity
# ---------------------------------------------------------------

relationships:

  - name: engagementClientOrganization
    description: >
      Links each Engagement to its Client Organization Account.
      Many Engagements per Account (serial or concurrent
      engagements with the same client) per Account Entity PRD.
      Source for client-side roll-ups in MN/CR analytics. See PRD
      MN-INTAKE Section "Process Workflow" and Engagement Entity
      PRD v1.2 Section 4.
    entity: Engagement
    entityForeign: Account
    linkType: manyToOne
    link: clientOrganization
    linkForeign: engagements
    label: "Client Organization"
    labelForeign: "Engagements"
    audited: true

  - name: engagementAssignedMentor
    description: >
      Links each Engagement to the primary volunteer mentor
      Contact. Set during MN-MATCH. Many Engagements per Contact
      (a mentor may carry multiple engagements; capacity is
      enforced by MN-MATCH not by cardinality). Inverse side
      drives Contact.currentActiveClients aggregate roll-up
      (MR-MC-CF-001 → resolved here at the YAML level via this
      relationship). See PRD MN-MATCH-DAT-019.
    entity: Engagement
    entityForeign: Contact
    linkType: manyToOne
    link: assignedMentor
    linkForeign: assignedEngagements
    label: "Assigned Mentor"
    labelForeign: "Assigned Engagements"
    audited: true

  - name: engagementPrimaryEngagementContact
    description: >
      Links each Engagement to the single client contact who
      serves as the primary point of contact. Auto-set to the
      submitting contact at MN-INTAKE creation per
      MN-INTAKE-REQ-007 (post-deployment automation —
      MANUAL-CONFIG.md MN-MC-AA-006). All system-generated
      client-facing communications TO this contact, others CC'd
      per MN-RECON-DEC-003. See PRD MN-INTAKE-DAT-020.
    entity: Engagement
    entityForeign: Contact
    linkType: manyToOne
    link: primaryEngagementContact
    linkForeign: primaryEngagementsAsContact
    label: "Primary Engagement Contact"
    labelForeign: "Primary Engagements (as Contact)"
    audited: false

  - name: engagementContacts
    description: >
      Optional additional client contacts participating beyond the
      Primary Engagement Contact. Many engagements will have only
      the Primary Engagement Contact per MN-RECON-DEC-002.
      manyToMany so the same Contact can participate in multiple
      Engagements over time. See PRD MN-MATCH-DAT-021.
    entity: Engagement
    entityForeign: Contact
    linkType: manyToMany
    link: engagementContacts
    linkForeign: engagementsAsContact
    relationName: engagementContacts
    label: "Engagement Contacts"
    labelForeign: "Engagements (as Contact)"
    audited: false

  - name: engagementAdditionalMentors
    description: >
      Optional co-mentors and subject matter experts added by the
      mentor during MN-ENGAGE per MN-ENGAGE-REQ-006. manyToMany —
      a mentor may serve as additional mentor on many engagements.
      Coordinated informally outside the system before adding per
      MN-ENGAGE-DEC. See PRD MN-ENGAGE-DAT-015.
    entity: Engagement
    entityForeign: Contact
    linkType: manyToMany
    link: additionalMentors
    linkForeign: additionalEngagements
    relationName: engagementAdditionalMentors
    label: "Additional Mentors"
    labelForeign: "Additional Engagements (as Mentor)"
    audited: false

  - name: engagementReferringPartner
    description: >
      CR-contributed referral attribution. Links each Engagement
      to the partner Account that referred the client, when known.
      Set by the assigned mentor after the first session (primary
      write path) or by the Partner Coordinator for correction
      (exception write path). Source for partner-level engagement
      analytics per CR-PARTNER-MANAGE. See PRD
      CR-PARTNER-MANAGE-DAT-001 and Engagement Entity PRD v1.2
      Section 3.7.
    entity: Engagement
    entityForeign: Account
    linkType: manyToOne
    link: referringPartner
    linkForeign: referredEngagements
    label: "Referring Partner"
    labelForeign: "Referred Engagements"
    audited: false

  - name: engagementRequestedMentor
    description: >
      Optional client-selected preferred mentor recorded at MN-INTAKE
      via the intake form's preferred-mentor selector. Reviewed by the
      Client Assignment Coordinator during MN-MATCH per MN-MATCH-REQ-009;
      a preference, not a guarantee. manyToOne — many engagements may
      request the same mentor. See PRD MN-INTAKE-DAT-026 / MN-MATCH-DAT-024.
    entity: Engagement
    entityForeign: Contact
    linkType: manyToOne
    link: requestedMentor
    linkForeign: requestedEngagements

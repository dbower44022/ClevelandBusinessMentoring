version: "1.0"
content_version: "2.0.0"
description: >
  Mentor Recruitment (MR) domain — custom field additions to the
  native Contact entity. Refreshed against Contact Entity PRD v1.7
  (2026-05-04) using YAML schema v1.2.x constructs. Major changes
  from v1.0.0:

    - Moved deprecated v1.0 entity-level properties into the
      settings: block (none on Contact since it is native)
    - Set previously-overstated required:true to required:false on
      compliance fields per Contact PRD v1.7 columns
    - Added requiredWhen and visibleWhen for conditional fields
      (applicationDeclineReason, departureReason, departureDate)
    - Added formula:aggregate for currentActiveClients,
      totalLifetimeSessions, totalMentoringHours,
      totalSessionsLast30Days
    - Added formula:arithmetic for availableCapacity
    - Added externallyPopulated:true for LMS-fed training fields
    - Added duesRenewalDate per Contact PRD v1.7 (DUES-DEC-005)
    - Added duplicateChecks for personalEmail (block onMatch)
    - Added five savedViews previously in MANUAL-CONFIG.md
    - Added emailTemplates for the three MR-domain emails
    - Added workflows for the four cross-field automations the
      v1.1 vocabulary supports (terms timestamp, ethics timestamp,
      pause stops new clients, departure clear on reactivation)

  Twelve panels remain organized per MR Domain PRD v1.0 Section 4.

# Source: Mentor Recruitment Domain Product Requirements Document
#         v1.0 (04-03-26 23:00), Section 4 "Entity: Contact (Mentor)"
#         Contact Entity Product Requirements Document v1.7 (current)
#         for field-name reconciliation, shared field definitions,
#         and the duesRenewalDate addition. Engagement Entity PRD
#         v1.2 and Session Entity PRD v1.1 for cross-entity formula
#         relationship and field references.

# Revision History:
#   2.0.0 (2026-05-04) — Refreshed against current PRDs and v1.1+
#     schema. See MAJOR change list in description above. Field
#     count: 33 → 34 (added duesRenewalDate). New constructs:
#     1 duplicateChecks rule, 5 savedViews, 3 emailTemplates,
#     4 workflows, 5 formulas, multiple requiredWhen/visibleWhen.
#   1.0.0 (04-13-26) — Phase 9 YAML generation, initial commit.

entities:

  Contact:
    description: >
      Native Person-type entity. The single repository for all
      individuals known to CBM. This file defines the custom fields
      contributed by the Mentor Recruitment domain. Native fields
      (firstName, lastName, middleName, salutationName, title,
      emailAddress, phoneNumber, addressStreet/City/State/Country/
      PostalCode, etc.) are not created here — they exist by
      virtue of the Person entity type. Fields contributed by other
      domains (Mentoring, Client Recruiting, Fundraising) are
      defined in those domains' YAML files. The contactType
      multiEnum is owned here per Contact Entity PRD v1.7
      Section 3.1; downstream-domain YAMLs depend on its values
      ("Client", "Mentor", "Partner", "Donor", "Member",
      "Administrator", "Presenter") being present. See Contact
      Entity Product Requirements Document v1.7.

    duplicateChecks:

      - id: contact-personal-email
        fields: [personalEmail]
        normalize:
          personalEmail: lowercase-trim
        onMatch: block
        message: >
          A Contact with this personal email address already exists.
          Locate and update the existing record rather than creating
          a duplicate.
        alertTemplate: mentor-duplicate-email-alert
        alertTo: role:mentor-administrator

    emailTemplates:

      - id: mentor-application-confirmation
        name: "Mentor Application Confirmation"
        description: >
          Sent on creation of a new Contact with contactType
          containing "Mentor" and mentorStatus = "Submitted" per
          MR-APPLY-REQ-003.
        entity: Contact
        subject: "Thank you for applying to Cleveland Business Mentors"
        bodyFile: "templates/mentor-application-confirmation.html"
        mergeFields:
          - personalEmail

      - id: mentor-application-decline
        name: "Mentor Application Decline"
        description: >
          Sent when mentorStatus changes to Declined and
          applicationDeclineReason is populated. Body content
          conditional on applicationDeclineReason value.
        entity: Contact
        subject: "Update on your Cleveland Business Mentors application"
        bodyFile: "templates/mentor-application-decline.html"
        mergeFields:
          - personalEmail
          - applicationDeclineReason

      - id: mentor-duplicate-email-alert
        name: "Mentor Application Duplicate Email Alert"
        description: >
          Internal alert to Mentor Administrator when an
          application submission collides with an existing
          personalEmail. Referenced from the Contact duplicate-
          check rule.
        entity: Contact
        audience: role:mentor-administrator
        subject: "Duplicate mentor application: {{personalEmail}}"
        bodyFile: "templates/mentor-duplicate-email-alert.html"
        mergeFields:
          - personalEmail

    savedViews:

      - id: mentor-active
        name: "Mentor — Active"
        description: "All currently Active mentors."
        columns: [name, contactType, mentorStatus, acceptingNewClients, currentActiveClients, availableCapacity]
        filter:
          - { field: contactType,  op: contains, value: "Mentor" }
          - { field: mentorStatus, op: equals,   value: "Active" }
        orderBy: { field: name, direction: asc }

      - id: mentor-prospects
        name: "Mentor — Prospects"
        description: "Mentor contacts at Prospect status (MR-RECRUIT)."
        columns: [name, personalEmail, mentorStatus, createdAt]
        filter:
          - { field: contactType,  op: contains, value: "Mentor" }
          - { field: mentorStatus, op: equals,   value: "Prospect" }
        orderBy: { field: createdAt, direction: desc }

      - id: mentor-submitted-applications
        name: "Mentor — Submitted Applications"
        description: "Mentors at Submitted or In Review status (MR-APPLY)."
        columns: [name, personalEmail, mentorStatus, createdAt]
        filter:
          - { field: contactType,  op: contains, value: "Mentor" }
          - { field: mentorStatus, op: in,       value: ["Submitted", "In Review"] }
        orderBy: { field: createdAt, direction: asc }

      - id: mentor-inactivity-alert
        name: "Mentor — Inactivity Alert"
        description: >
          Active mentors with zero completed sessions in the last
          30 days (per MR-MANAGE inactivity monitoring).
        columns: [name, contactType, mentorStatus, totalSessionsLast30Days, currentActiveClients]
        filter:
          - { field: contactType,             op: contains, value: "Mentor" }
          - { field: mentorStatus,            op: equals,   value: "Active" }
          - { field: totalSessionsLast30Days, op: equals,   value: 0 }
        orderBy: { field: name, direction: asc }

      - id: mentor-needs-attention
        name: "Mentor — Needs Attention"
        description: >
          Active or Provisional mentors missing background-check
          completion. Used during MR-ONBOARD compliance review.
        columns: [name, mentorStatus, backgroundCheckCompleted, ethicsAgreementAccepted]
        filter:
          all:
            - { field: contactType, op: contains, value: "Mentor" }
            - any:
                - { field: mentorStatus, op: equals, value: "Active" }
                - { field: mentorStatus, op: equals, value: "Provisional" }
            - { field: backgroundCheckCompleted, op: equals, value: false }
        orderBy: { field: createdAt, direction: asc }

    workflows:

      - id: terms-acceptance-timestamp
        name: "Stamp terms and conditions acceptance time"
        description: >
          When termsAndConditionsAccepted flips to true at
          application submission, populate the acceptance timestamp.
          See MR-APPLY-DAT-021 / -022.
        trigger:
          event: onFieldChange
          field: termsAndConditionsAccepted
          to: true
        actions:
          - { type: setField, field: termsAndConditionsAcceptanceDateTime, value: now }

      - id: ethics-acceptance-timestamp
        name: "Stamp ethics agreement acceptance time"
        description: >
          When ethicsAgreementAccepted flips to true (set by Mentor
          Administrator), populate the acceptance timestamp. See
          MR-ONBOARD-DAT-004 / -005.
        trigger:
          event: onFieldChange
          field: ethicsAgreementAccepted
          to: true
        actions:
          - { type: setField, field: ethicsAgreementAcceptanceDateTime, value: now }

      - id: pause-stops-new-clients
        name: "Stop accepting new clients on pause or inactive"
        description: >
          When mentorStatus transitions to Paused or Inactive, set
          acceptingNewClients to false automatically. One-way per
          MR-ONBOARD-DAT-010.
        trigger:
          event: onFieldTransition
          field: mentorStatus
          to: ["Paused", "Inactive"]
        actions:
          - { type: setField, field: acceptingNewClients, value: false }

      - id: clear-departure-on-reactivation
        name: "Clear departure fields on reactivation"
        description: >
          When mentorStatus transitions out of Resigned or Departed
          back to Active or Provisional, clear departureReason and
          departureDate per MR-DEPART-DAT-002 / -003 and
          MR-RECON-DEC-001.
        trigger:
          event: onFieldTransition
          field: mentorStatus
          from: ["Resigned", "Departed"]
          to:   ["Active",   "Provisional"]
        actions:
          - { type: clearField, field: departureReason }
          - { type: clearField, field: departureDate }

    fields:

      # --- Section 4.1 — Identity and Contact Information ---

      - name: contactType
        type: multiEnum
        label: "Contact Type"
        description: >
          Discriminator field for the Contact entity. Determines
          which type-specific fields and panels are visible. A
          Contact may hold any combination of values. Set based on
          how the Contact enters the system (e.g., Mentor at
          MR-APPLY submission, Client at MN-INTAKE submission). See
          Contact Entity PRD v1.7 Section 3.1 and Entity Inventory
          EI-2a.
        category: "Identity and Contact Information"
        required: true
        audited: true
        options:
          - "Client"
          - "Mentor"
          - "Partner"
          - "Administrator"
          - "Presenter"
          - "Donor"
          - "Member"
        style:
          "Client": "primary"
          "Mentor": "success"
          "Partner": "info"
          "Administrator": "warning"
          "Presenter": "default"
          "Donor": "default"
          "Member": "default"

      - name: preferredName
        type: varchar
        label: "Preferred Name"
        description: >
          The name the contact prefers to be called. Used in
          communications when provided. Originally defined for
          Client contacts; applicable to all contact types per
          Contact PRD v1.7 Section 3.1. See PRD MN-INTAKE-DAT-011
          and MR-APPLY-DAT-006.
        category: "Identity and Contact Information"
        required: false

      - name: personalEmail
        type: email
        label: "Personal Email"
        description: >
          The applicant's personal email address. Used for
          confirmation email and all pre-activation communications.
          Separate from the native emailAddress field and from
          cbmEmailAddress. Subject to a duplicate-check block per
          MR-APPLY conflict flow. See PRD MR-APPLY-DAT-007.
        category: "Identity and Contact Information"
        required: true

      - name: cbmEmailAddress
        type: email
        label: "CBM Email Address"
        description: >
          The mentor's assigned CBM organizational email address.
          Populated by the Mentor Administrator during onboarding.
          Email account provisioned externally. Retained after
          departure as historical data. See PRD MR-ONBOARD-DAT-008.
        category: "Identity and Contact Information"
        required: false

      - name: linkedInProfile
        type: url
        label: "LinkedIn Profile"
        description: >
          The contact's LinkedIn profile URL. Provides professional
          background context. Defined for Client contacts at
          MN-INTAKE and for Mentor contacts in MR per Contact PRD
          v1.7 Section 3.1. See PRD MN-INTAKE-DAT-015 and
          MR-APPLY-DAT-009.
        category: "Identity and Contact Information"
        required: false

      # --- Section 4.2 — Professional Background ---

      # Note: `title` is a native Person-type field and is not
      # recreated here. It is placed in the Professional Background
      # panel via layout below.

      - name: currentEmployer
        type: varchar
        label: "Current Employer"
        description: >
          Name of the contact's current employer or organization.
          Collected at application, mentor-editable after activation.
          Displayed in the mentor directory. See PRD
          MR-APPLY-DAT-010.
        category: "Professional Background"
        required: false

      - name: currentlyEmployed
        type: bool
        label: "Currently Employed"
        description: >
          Whether the applicant is employed at the time of
          application. Point-in-time snapshot. See PRD
          MR-APPLY-DAT-011.
        category: "Professional Background"
        required: false

      - name: yearsOfBusinessExperience
        type: int
        label: "Years of Business Experience"
        description: >
          Total years of professional business experience.
          Collected at application, mentor-editable after
          activation. Displayed in the mentor directory. See PRD
          MR-APPLY-DAT-012.
        category: "Professional Background"
        required: false

      - name: professionalBio
        type: wysiwyg
        label: "Professional Bio"
        description: >
          Free-form description of professional background and
          work experience. Collected at application,
          mentor-editable after activation. Displayed in the mentor
          directory. See PRD MR-APPLY-DAT-013.
        category: "Professional Background"
        required: false

      # --- Section 4.3 — Expertise and Matching ---

      - name: industrySectors
        type: multiEnum
        label: "Industry Sectors"
        description: >
          Industry sectors where the mentor has experience. Primary
          matching criterion. 20 standard United States Census
          Bureau NAICS top-level sector titles per MR-Y9-EXC-001.
          Values must align with Account.industrySector (single-
          select) declared in MN-Account.yaml. See PRD
          MR-APPLY-DAT-014.
        category: "Expertise and Matching"
        required: true
        options:
          - "Agriculture, Forestry, Fishing and Hunting"
          - "Mining, Quarrying, and Oil and Gas Extraction"
          - "Utilities"
          - "Construction"
          - "Manufacturing"
          - "Wholesale Trade"
          - "Retail Trade"
          - "Transportation and Warehousing"
          - "Information"
          - "Finance and Insurance"
          - "Real Estate and Rental and Leasing"
          - "Professional, Scientific, and Technical Services"
          - "Management of Companies and Enterprises"
          - "Administrative and Support and Waste Management"
          - "Educational Services"
          - "Health Care and Social Assistance"
          - "Arts, Entertainment, and Recreation"
          - "Accommodation and Food Services"
          - "Other Services (except Public Administration)"
          - "Public Administration"

      - name: mentoringFocusAreas
        type: multiEnum
        label: "Mentoring Focus Areas"
        description: >
          Specific areas where the mentor provides guidance.
          Primary matching criterion. Values align with the
          Engagement-level mentoringFocusAreas (declared in
          MN-Engagement.yaml using the same 42-value list). 42
          values per MR-Y9-EXC-002. Mentor-editable after
          activation. See PRD MR-APPLY-DAT-015.
        category: "Expertise and Matching"
        required: true
        options:
          - "Accounting & Tax Services"
          - "Advertising, Design, & Marketing"
          - "Agriculture"
          - "Animal & Veterinary Services"
          - "Architecture, Engineering, & Related Services"
          - "Arts, Entertainment, & Recreation"
          - "Auto Repair & Mechanic"
          - "Beauty, Cosmetics & Salon Services"
          - "Business Consulting & Coaching"
          - "Childcare"
          - "Commercial & Residential Services"
          - "Construction"
          - "Counseling & Therapy"
          - "Distribution & Transportation of Goods"
          - "Education"
          - "Farming & Livestock"
          - "Fine Arts, Artisan, & Craft Work"
          - "Fishing & Hunting"
          - "Food & Beverage"
          - "Forestry"
          - "Funeral & Death Care Services"
          - "Information Technology"
          - "Manufacturing"
          - "Media & Publishing"
          - "Mining, Quarry, & Utilities"
          - "Nonprofit"
          - "Personal Care Services"
          - "Photography & Video Services"
          - "Professional Services"
          - "Public Relations & Communications"
          - "Real Estate"
          - "Recruiting & Staffing"
          - "Rental & Leasing"
          - "Restaurant & Bar"
          - "Retail"
          - "Social Assistance & Family Services"
          - "Transportation"
          - "Travel, Hospitality, & Tourism"
          - "Warehousing"
          - "Waste Management & Disposal"
          - "Website Development"
          - "Wellness, Healthcare, & Home Health"

      - name: skillsExpertiseTags
        type: multiEnum
        label: "Skills and Expertise Tags"
        description: >
          Finer-grained expertise tags beyond industry sector and
          focus areas. Supports advanced mentor-client matching.
          33 values enumerated per MR-Y9-EXC-003. See PRD
          MR-APPLY-DAT-016.
        category: "Expertise and Matching"
        required: false
        options:
          - "Accounting & Finance"
          - "Advertising"
          - "Bookkeeping"
          - "Branding"
          - "Budgeting"
          - "Business Structure"
          - "Cash Flow"
          - "Communications Tech"
          - "Contracts"
          - "Cybersecurity"
          - "Digital Marketing"
          - "Disaster Prep & Recovery"
          - "Ecommerce"
          - "Financial Literacy"
          - "Franchising"
          - "Funding/Loans"
          - "Government Contracting"
          - "Government Regulations"
          - "Hardware & Equipment"
          - "Human Resources"
          - "Import & Export"
          - "Intellectual Property"
          - "Legal"
          - "Management & Operations"
          - "Marketing"
          - "Marketing Strategy"
          - "PR/Media"
          - "Pricing"
          - "Social Media"
          - "Supply Chain Management"
          - "Tax Planning"
          - "Technology"
          - "Websites"

      - name: fluentLanguages
        type: multiEnum
        label: "Fluent Languages"
        description: >
          Languages the mentor is fluent in. Used to match clients
          who prefer to work in a language other than English. 36
          values per MR-Y9-EXC-004. See PRD MR-APPLY-DAT-017.
        category: "Expertise and Matching"
        required: false
        options:
          - "American Sign Language"
          - "Arabic"
          - "Bengali"
          - "Cantonese"
          - "Chinese"
          - "Czech"
          - "Danish"
          - "Dutch"
          - "English"
          - "French"
          - "German"
          - "Greek"
          - "Gujarati"
          - "Hebrew"
          - "Hindi"
          - "Hungarian"
          - "Indonesian"
          - "Italian"
          - "Japanese"
          - "Korean"
          - "Lithuanian"
          - "Malay"
          - "Mandarin"
          - "Marathi"
          - "Norwegian"
          - "Pashto"
          - "Polish"
          - "Portuguese"
          - "Punjabi"
          - "Russian"
          - "Spanish"
          - "Swedish"
          - "Tagalog"
          - "Telugu"
          - "Urdu"
          - "Other"

      # --- Section 4.4 — Motivation and Referral ---

      - name: whyInterestedInMentoring
        type: wysiwyg
        label: "Why Interested in Mentoring"
        description: >
          The mentor's stated motivation for joining CBM as a
          volunteer mentor. Collected at application,
          mentor-editable after activation. Not displayed in the
          mentor directory. See PRD MR-APPLY-DAT-018.
        category: "Motivation and Referral"
        required: false

      - name: howDidYouHearAboutCbm
        type: enum
        label: "How Did You Hear About CBM"
        description: >
          How the contact learned about CBM's mentoring program.
          Referral source recorded at point of first contact or at
          application. 8-value list per MR-Y9-EXC-005 supersedes
          the Contact Entity PRD v1.3's 10-value list (see
          EXCEPTIONS.md MR-Y9-EXC-005 in this domain's archive).
          Supports CR-MARKETING channel-effectiveness reporting.
          See PRD MR-RECRUIT-DAT-006.
        category: "Motivation and Referral"
        required: false
        options:
          - "Partner Referral"
          - "Social Media"
          - "CBM Email"
          - "Workshop or Event"
          - "Search Engine"
          - "News or Media"
          - "Personal Referral"
          - "Other"

      # --- Section 4.5 — Application and Compliance ---

      - name: felonyConvictionDisclosure
        type: bool
        label: "Felony Conviction Disclosure"
        description: >
          Whether the applicant discloses a felony conviction.
          System-populated from the application form. Admin-only;
          hidden from the mentor after submission. May inform the
          Mentor Administrator's decision on whether to require a
          background check during onboarding. Field-level access
          control configured post-deployment — see MANUAL-CONFIG.md
          MR-MC-AC-001. See PRD MR-APPLY-DAT-020.
        category: "Application and Compliance"
        required: false

      - name: termsAndConditionsAccepted
        type: bool
        label: "Terms and Conditions Accepted"
        description: >
          System-set to Yes at application submission per
          MR-APPLY-DAT-021. Admin-only; read-only for contacts.
          Triggers the terms-acceptance-timestamp workflow above.
        category: "Application and Compliance"
        required: false
        readOnly: true

      - name: termsAndConditionsAcceptanceDateTime
        type: datetime
        label: "Terms and Conditions Acceptance Date/Time"
        description: >
          System-recorded timestamp of terms-and-conditions
          acceptance. Populated by the terms-acceptance-timestamp
          workflow. Admin-only; read-only for contacts. See PRD
          MR-APPLY-DAT-022.
        category: "Application and Compliance"
        required: false
        readOnly: true

      - name: applicationDeclineReason
        type: enum
        label: "Application Decline Reason"
        description: >
          Reason the mentor application was declined. Required when
          mentorStatus = Declined per MR-APPLY-DAT-024. Visible
          only when mentorStatus = Declined per MR-MC-DL-003.
          Admin-only. Used during both application and onboarding
          decline. Reconciled to 7 values per MR-RECON-DEC-002.
        category: "Application and Compliance"
        required: false
        requiredWhen:
          - { field: mentorStatus, op: equals, value: "Declined" }
        visibleWhen:
          - { field: mentorStatus, op: equals, value: "Declined" }
        options:
          - "Insufficient Experience"
          - "Incomplete Application"
          - "Failed Background Check"
          - "Conflict of Interest"
          - "Unresponsive"
          - "Candidate Withdrew"
          - "Other"

      - name: trainingCompleted
        type: bool
        label: "Training Completed"
        description: >
          Whether the mentor has completed required training
          modules. Populated by the LMS integration when available;
          manually set by the Mentor Administrator as a fallback.
          Marked externallyPopulated so seed-data and verification
          skip it. See PRD MR-ONBOARD-DAT-002 and MANUAL-CONFIG.md
          MR-MC-IN-001.
        category: "Application and Compliance"
        required: false
        externallyPopulated: true

      - name: trainingCompletionDate
        type: date
        label: "Training Completion Date"
        description: >
          Date required training was completed. LMS-populated or
          manually set as fallback. Paired with trainingCompleted.
          See PRD MR-ONBOARD-DAT-003.
        category: "Application and Compliance"
        required: false
        externallyPopulated: true

      - name: ethicsAgreementAccepted
        type: bool
        label: "Ethics Agreement Accepted"
        description: >
          Whether the mentor has accepted the current CBM ethics
          agreement. Set by the Mentor Administrator after the
          mentor completes the external acceptance process.
          Admin-only, read-only for mentors. Triggers the
          ethics-acceptance-timestamp workflow above. See PRD
          MR-ONBOARD-DAT-004.
        category: "Application and Compliance"
        required: false

      - name: ethicsAgreementAcceptanceDateTime
        type: datetime
        label: "Ethics Agreement Acceptance Date/Time"
        description: >
          Date and time of the mentor's ethics agreement
          acceptance. Populated by the ethics-acceptance-timestamp
          workflow. Admin-only. See PRD MR-ONBOARD-DAT-005.
        category: "Application and Compliance"
        required: false
        readOnly: true

      - name: backgroundCheckCompleted
        type: bool
        label: "Background Check Completed"
        description: >
          Whether a background check has been completed.
          Conditional-required (only populated when the Mentor
          Administrator determines a background check is required) —
          this trigger is operational rather than a record-state
          condition expressible in YAML, so requiredWhen is not
          set. Admin-only, hidden from mentors. See PRD
          MR-ONBOARD-DAT-006.
        category: "Application and Compliance"
        required: false

      - name: backgroundCheckDate
        type: date
        label: "Background Check Date"
        description: >
          Date the background check was completed. Conditional —
          only populated when a background check is conducted.
          Admin-only, hidden from mentors. See PRD
          MR-ONBOARD-DAT-007.
        category: "Application and Compliance"
        required: false

      # --- Section 4.6 — Lifecycle and Status ---

      - name: mentorStatus
        type: enum
        label: "Mentor Status"
        description: >
          The current lifecycle stage of the mentor. Central field
          spanning all five Mentor Recruitment processes. Drives
          assignment eligibility, role-based access control, and
          inactivity monitoring. Audited per Contact PRD v1.7
          Implementation note. Triggers the
          pause-stops-new-clients and clear-departure-on-
          reactivation workflows above. See PRD MR-RECRUIT-DAT-005.
        category: "Lifecycle and Status"
        required: true
        audited: true
        options:
          - "Prospect"
          - "Submitted"
          - "In Review"
          - "Provisional"
          - "Active"
          - "Paused"
          - "Inactive"
          - "Resigned"
          - "Departed"
          - "Declined"
        style:
          "Prospect": "default"
          "Submitted": "info"
          "In Review": "info"
          "Provisional": "warning"
          "Active": "success"
          "Paused": "warning"
          "Inactive": "default"
          "Resigned": "danger"
          "Departed": "danger"
          "Declined": "danger"

      - name: departureReason
        type: enum
        label: "Departure Reason"
        description: >
          Reason the mentor exited CBM. Set by the Mentor
          Administrator at departure. Cleared on reactivation by
          the clear-departure-on-reactivation workflow. Visible
          when mentorStatus is Resigned or Departed per
          MR-MC-DL-004. See PRD MR-DEPART-DAT-002.
        category: "Lifecycle and Status"
        required: false
        visibleWhen:
          - { field: mentorStatus, op: in, value: ["Resigned", "Departed"] }
        options:
          - "Relocated"
          - "Career Change"
          - "Time Constraints"
          - "Personal"
          - "Other"

      - name: departureDate
        type: date
        label: "Departure Date"
        description: >
          Date the mentor departed. Set by the Mentor Administrator
          at departure. Cleared on reactivation by the
          clear-departure-on-reactivation workflow. Visible when
          mentorStatus is Resigned or Departed. See PRD
          MR-DEPART-DAT-003.
        category: "Lifecycle and Status"
        required: false
        visibleWhen:
          - { field: mentorStatus, op: in, value: ["Resigned", "Departed"] }

      # --- Section 4.7 — Role Eligibility ---

      - name: isPrimaryMentor
        type: bool
        label: "Is Primary Mentor"
        description: >
          Whether this mentor is eligible for primary mentor
          assignments. Defaults to Yes on activation per Contact
          PRD v1.7. Adjustable by the Mentor Administrator in
          Mentor Management. See PRD MR-ONBOARD-DAT-013.
        category: "Role Eligibility"
        required: true
        default: "true"

      - name: isCoMentor
        type: bool
        label: "Is Co-Mentor"
        description: >
          Whether this mentor is eligible for co-mentor
          assignments. Set by the Mentor Administrator based on
          discussion with the mentor. Not set during onboarding.
          See PRD MR-MANAGE-DAT-015.
        category: "Role Eligibility"
        required: true

      - name: isSubjectMatterExpert
        type: bool
        label: "Is Subject Matter Expert"
        description: >
          Whether this mentor is eligible for subject matter expert
          assignments. Set by the Mentor Administrator based on
          discussion with the mentor. Not set during onboarding.
          See PRD MR-MANAGE-DAT-016.
        category: "Role Eligibility"
        required: true

      # --- Section 4.8 — Capacity and Availability ---

      - name: maximumClientCapacity
        type: int
        label: "Maximum Client Capacity"
        description: >
          Maximum number of simultaneous active client engagements.
          Initially set by Mentor Administrator during onboarding.
          Mentor-editable after activation. Admin-overridable. See
          PRD MR-ONBOARD-DAT-009.
        category: "Capacity and Availability"
        required: true

      - name: acceptingNewClients
        type: bool
        label: "Accepting New Clients"
        description: >
          Whether the mentor is available for new client
          assignments. Set to Yes during onboarding. Set to No
          automatically when status changes to Paused or Inactive
          via the pause-stops-new-clients workflow above.
          Mentor-editable when Active. Admin-overridable. See PRD
          MR-ONBOARD-DAT-010.
        category: "Capacity and Availability"
        required: true

      - name: currentActiveClients
        type: int
        label: "Current Active Clients"
        description: >
          Count of Engagements where this mentor is the assigned
          mentor and engagementStatus is Active or Assigned.
          System-calculated via aggregate roll-up using the
          engagementAssignedMentor relationship (link name:
          assignedMentor on Engagement side). See PRD
          MR-MANAGE-DAT-019.
        category: "Capacity and Availability"
        required: false
        readOnly: true
        formula:
          type: aggregate
          function: count
          relatedEntity: Engagement
          via: assignedMentor
          where:
            - { field: engagementStatus, op: in, value: ["Active", "Assigned"] }

      - name: availableCapacity
        type: int
        label: "Available Capacity"
        description: >
          Maximum Client Capacity minus Current Active Clients.
          System-calculated arithmetic formula. See PRD
          MR-MANAGE-DAT-020.
        category: "Capacity and Availability"
        required: false
        readOnly: true
        formula:
          type: arithmetic
          expression: "maximumClientCapacity - currentActiveClients"

      # --- Section 4.9 — Mentor Analytics ---

      - name: totalLifetimeSessions
        type: int
        label: "Total Lifetime Sessions"
        description: >
          Count of all completed sessions across all of this
          mentor's engagements. Multi-hop aggregate roll-up via
          Session → Engagement → Contact (assignedMentor). See PRD
          MR-MANAGE-DAT-021.
        category: "Mentor Analytics"
        required: false
        readOnly: true
        formula:
          type: aggregate
          function: count
          relatedEntity: Session
          via: assignedMentor
          join:
            - { from: Session, link: parent, to: Engagement }
          where:
            - { field: status, op: equals, value: "Completed" }

      - name: totalMentoringHours
        type: float
        label: "Total Mentoring Hours"
        description: >
          Sum of session duration (minutes) across completed
          Session records. Stored as minutes; report layer divides
          by 60 for the human-friendly hours display. Multi-hop
          aggregate via Session → Engagement → Contact
          (assignedMentor). See PRD MR-MANAGE-DAT-022.
        category: "Mentor Analytics"
        required: false
        readOnly: true
        formula:
          type: aggregate
          function: sum
          field: duration
          relatedEntity: Session
          via: assignedMentor
          join:
            - { from: Session, link: parent, to: Engagement }
          where:
            - { field: status, op: equals, value: "Completed" }

      - name: totalSessionsLast30Days
        type: int
        label: "Total Sessions (Last 30 Days)"
        description: >
          Count of completed sessions in the last 30 days across
          all of this mentor's engagements. Used by the
          mentor-inactivity-alert saved view. Multi-hop aggregate
          using Section 11 relative-date vocabulary. See PRD
          MR-MANAGE-DAT-023.
        category: "Mentor Analytics"
        required: false
        readOnly: true
        formula:
          type: aggregate
          function: count
          relatedEntity: Session
          via: assignedMentor
          join:
            - { from: Session, link: parent, to: Engagement }
          where:
            - { field: status,    op: equals,             value: "Completed" }
            - { field: dateStart, op: greaterThanOrEqual, value: "lastNDays:30" }

      # --- Section 4.10 — Board and Organizational ---

      - name: boardPosition
        type: varchar
        label: "Board Position"
        description: >
          The mentor's title or role on the CBM board (e.g., Board
          Chair, Treasurer). Visible for CBM organizational member
          types. Populated by the Mentor Administrator. See PRD
          MR-MANAGE-DAT-025 and Contact Entity PRD v1.7
          Section 3.2.
        category: "Board and Organizational"
        required: false

      # --- Section 4.11 — Dues Summary ---

      - name: duesStatus
        type: enum
        label: "Dues Status"
        description: >
          Summary field on the Contact record reflecting the
          mentor's current-year dues standing. Set by the Mentor
          Administrator. Maintained independently of individual
          Dues records (see Dues entity). Admin-only, read-only
          for mentors (field-level access control configured
          post-deployment per MANUAL-CONFIG.md MR-MC-AC-001). See
          PRD MR-MANAGE-DAT-026.
        category: "Dues Summary"
        required: false
        options:
          - "Unpaid"
          - "Paid"
          - "Waived"
        style:
          "Unpaid": "warning"
          "Paid": "success"
          "Waived": "default"

      - name: duesPaymentDate
        type: date
        label: "Dues Payment Date"
        description: >
          Date of most recent dues payment. Not applicable when
          duesStatus = Waived. Admin-only. See PRD
          MR-MANAGE-DAT-027.
        category: "Dues Summary"
        required: false

      - name: duesRenewalDate
        type: date
        label: "Dues Renewal Date"
        description: >
          The mentor's annual dues renewal date, derived from
          their activation anniversary. Used by the Mentor
          Administrator to determine when to create each year's
          Dues record. Maintained per DUES-DEC-005 / Contact
          Entity PRD v1.7 Section 3.3 Dues subsection. New in
          MR-Contact v2.0.0 — was previously surfaced only in
          MANUAL-CONFIG.md MR-MC-WF-009.
        category: "Dues Summary"
        required: false

      # --- Section 4.12 — Campaign Tracking ---

      - name: campaignEngagementNotes
        type: text
        label: "Campaign Engagement Notes"
        description: >
          Campaign engagement history recorded manually as notes
          on the prospect contact record. Includes emails sent,
          opened, clicked, and follow-up activity. Recorded after
          each campaign execution. Automated sync is a planned
          future enhancement (see MR-RECRUIT-ISS-002). See PRD
          MR-RECRUIT-DAT-010.
        category: "Campaign Tracking"
        required: false

    layout:

      detail:
        panels:

          - label: "Identity and Contact Information"
            description: >
              Core identity fields: contactType (discriminator),
              name fields (native plus preferredName), email
              addresses (native emailAddress plus personalEmail and
              cbmEmailAddress), phone (native), linkedInProfile.
              Mentor Recruitment Domain PRD Section 4.1.
            rows:
              - [contactType, null]
              - [firstName, lastName]
              - [preferredName, null]
              - [emailAddress, personalEmail]
              - [cbmEmailAddress, phoneNumber]
              - [linkedInProfile, null]

          - label: "Professional Background"
            description: >
              Professional Background panel. Mentor Recruitment
              Domain PRD Section 4.2.
            rows:
              - [title, currentEmployer]
              - [currentlyEmployed, yearsOfBusinessExperience]
              - [professionalBio]

          - label: "Expertise and Matching"
            description: >
              Matching-criteria fields. Mentor Recruitment Domain
              PRD Section 4.3.
            tabs:
              - label: "Expertise and Matching"
                category: "Expertise and Matching"

          - label: "Motivation and Referral"
            description: >
              Mentor Recruitment Domain PRD Section 4.4.
            tabs:
              - label: "Motivation and Referral"
                category: "Motivation and Referral"

          - label: "Application and Compliance"
            description: >
              Application and compliance fields. Several fields
              require field-level access control configured
              post-deployment. Mentor Recruitment Domain PRD
              Section 4.5.
            tabs:
              - label: "Application and Compliance"
                category: "Application and Compliance"

          - label: "Lifecycle and Status"
            description: >
              Mentor status and departure fields. Mentor
              Recruitment Domain PRD Section 4.6.
            tabs:
              - label: "Lifecycle and Status"
                category: "Lifecycle and Status"

          - label: "Role Eligibility"
            description: >
              Assignment-eligibility booleans. Mentor Recruitment
              Domain PRD Section 4.7.
            tabs:
              - label: "Role Eligibility"
                category: "Role Eligibility"

          - label: "Capacity and Availability"
            description: >
              Mentor capacity tracking. Mentor Recruitment Domain
              PRD Section 4.8.
            tabs:
              - label: "Capacity and Availability"
                category: "Capacity and Availability"

          - label: "Mentor Analytics"
            description: >
              System-calculated activity analytics. Mentor
              Recruitment Domain PRD Section 4.9.
            tabs:
              - label: "Mentor Analytics"
                category: "Mentor Analytics"

          - label: "Board and Organizational"
            description: >
              Board role. Mentor Recruitment Domain PRD
              Section 4.10.
            tabs:
              - label: "Board and Organizational"
                category: "Board and Organizational"

          - label: "Dues Summary"
            description: >
              Contact-level summary of current-year dues.
              Individual Dues records are managed on the Dues
              entity. Mentor Recruitment Domain PRD Section 4.11.
            tabs:
              - label: "Dues Summary"
                category: "Dues Summary"

          - label: "Campaign Tracking"
            description: >
              Manually-recorded campaign engagement history for
              prospect contacts. Mentor Recruitment Domain PRD
              Section 4.12.
            tabs:
              - label: "Campaign Tracking"
                category: "Campaign Tracking"

      list:
        columns:
          - field: name
            width: 22
          - field: contactType
            width: 14
          - field: mentorStatus
            width: 12
          - field: emailAddress
            width: 22
          - field: personalEmail
            width: 18
          - field: acceptingNewClients
            width: 12

version: "1.0"
content_version: "1.0.0"
description: "CBM EspoCRM Configuration — Contact: Partner Contact variant"

# Source: CBM Phase 2 Entity Definition Sessions A + B — Contact: Partner Contact
# Generated: March 2026
# PRD Reference: cbm_contact_partner_prd.md

# MANUAL CONFIG REQUIRED:
# - Note logging on Partner Contact: Entity Manager → Contact → Stream
# - Field change audit logging: Entity Manager → Contact → Stream
# - Last Activity Date formula: Entity Manager → Contact → Formula

entities:
  Contact:
    description: >
      Represents individuals at partner organizations that CBM works
      with — banks, nonprofits, universities, and other community
      organizations. The primary use case is relationship management —
      knowing who the contact is, their context within their organization
      and CBM, and the history of interactions. Partner contacts have no
      lifecycle status and are manually created and maintained.

    fields:

      # ---------------------------------------------------------------
      # IDENTITY & CONTACT
      # ---------------------------------------------------------------

      - name: contactType
        type: enum
        label: "Contact Type"
        required: true
        default: "Partner Contact"
        category: "Overview"
        description: >
          Primary role of this contact in CBM. Defaults to Partner
          Contact for this variant.
        options:
          - "Client"
          - "Mentor"
          - "Partner Contact"
          - "Administrator"

      - name: linkedInProfile
        type: url
        label: "LinkedIn"
        category: "Overview"
        description: >
          LinkedIn profile URL for professional context and background
          research on the partner contact.

      # ---------------------------------------------------------------
      # ANALYTICS (READ-ONLY, CALCULATED)
      # ---------------------------------------------------------------

      - name: lastActivityDate
        type: date
        label: "Last Activity Date"
        readOnly: true
        category: "Overview"
        description: >
          Most recent activity — email, call, note, or meeting.
          Calculated automatically from activity records. Read-only.
          MANUAL CONFIG: Configure formula in Entity Manager →
          Contact → Formula.

    layout:
      detail:
        panels:

          - label: "Overview"
            tabBreak: true
            tabLabel: "Overview"
            style: default
            rows:
              - [name, contactType]
              - [account, title]
              - [emailAddress, phoneNumber]
              - [linkedInProfile, lastActivityDate]

          - label: "Personal"
            tabBreak: true
            tabLabel: "Personal"
            style: default
            rows:
              - [birthday, null]

          - label: "Activity"
            tabBreak: true
            tabLabel: "Activity"
            style: default
            description: >
              Primary interaction log — notes, emails, calls, meetings.
            rows: []

      list:
        columns:
          - field: lastName
            width: 12
          - field: firstName
            width: 12
          - field: account
            width: 18
          - field: title
            width: 13
          - field: contactType
            width: 10
          - field: emailAddress
            width: 18
          - field: phoneNumber
            width: 10

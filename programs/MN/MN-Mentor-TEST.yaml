version: "1.0"
content_version: "1.0.0"
description: >
  Mentoring (MN) domain — native Contact entity declaration. The MN
  domain consumes Contact in four roles via Engagement relationships
  (assignedMentor, primaryEngagementContact, engagementContacts,
  additionalMentors) and a fifth role via Session relationships
  (mentorAttendees, clientAttendees) — but introduces no MN-only
  custom fields on Contact beyond what already exists in the
  shared/MR-domain Contact PRD definition. The "Client" value of
  contactType (declared in MR-Contact.yaml as part of the
  multi-valued discriminator) is used for client contacts created by
  MN-INTAKE. All Engagement-side and Session-side relationships to
  Contact are declared in MN-Engagement.yaml and MN-Session.yaml,
  respectively, not here. This file exists to document the MN
  domain's read/use stance on Contact and to keep parity with the
  Phase 9 expected-outputs list. See EXCEPTIONS.md MN-Y9-EXC-001.

# Source: Mentoring Domain Product Requirements Document v1.0
#         (04-01-26), Sections 4 (Data Reference). Contact Entity
#         Product Requirements Document v1.7 — confirms client
#         contact native fields (firstName, lastName, middleName,
#         emailAddress, phoneNumber, addressPostalCode for Zip Code,
#         linkedInProfile [shared], preferredName [shared]) and
#         confirms Primary Contact is a relationship-level bool, not
#         a Contact field (CON-DEC-001).

entities:

  MentorProfile:
    description: >
      Individual mentoring meetings within an Engagement. Created
      and managed during MN-ENGAGE. Uses the Event type, so
      dateStart (= Session Date/Time), dateEnd (calculated as
      dateStart + duration; read-only), duration (minutes),
      status (custom seven-value enum), and parent (link to
      Engagement) are inherited per SES decisions 1–3, 8.
      Activity stream enabled per Session Entity PRD Section 1.
      Auto-generated name "{Engagement Name} — {Session Date}" is
      implemented via post-deployment automation per SES-DEC-004
      (see MANUAL-CONFIG.md MN-MC-AA-007). The first Session
      reaching Completed status auto-transitions the parent
      Engagement to Active per MN-ENGAGE-REQ-001 — implemented
      via post-deployment automation (MANUAL-CONFIG.md
      MN-MC-AA-008). Mentor / Client attendee minimum-of-one
      enforcement at Completed status is implemented via
      post-deployment workflow validation per Session Entity PRD
      Implementation Note 8 (MANUAL-CONFIG.md MN-MC-AA-009).
    action: create
    type: Base
    settings:
      labelSingular: "Mentor"
      labelPlural: "Mentors"
      stream: true
      disabled: false
      # Session.name is auto-generated by post-deployment automation
      # (SES-DEC-004 — "{Engagement Name} — {Session Date}"). Until that
      # automation is in place, leave autoPlaceName at the default true
      # so the user can supply name manually if needed at create time.

    fields:

      # --- Section 3.1 — Session Detail Fields ---

      - name: mentorStatus
        type: enum
        label: "Mentor Status"
        description: >
          How the session was conducted. Required when status =
          Completed (workflow-validated post-deployment per Session
          Entity PRD Implementation Note 8 — see MANUAL-CONFIG.md
          MN-MC-CR-001). Drives conditional visibility of
          meetingLocationType. See PRD MN-ENGAGE-DAT-026.
        category: "Session Detail"
        required: false
        options:
          - "Candidate"
          - "Approved"
          - "Retired"
          - "Terminated"

      - name: mentorType
        type: enum
        label: "Mentor Type"
        description: >
          How the session was conducted. Required when status =
          Completed (workflow-validated post-deployment per Session
          Entity PRD Implementation Note 8 — see MANUAL-CONFIG.md
          MN-MC-CR-001). Drives conditional visibility of
          meetingLocationType. See PRD MN-ENGAGE-DAT-026.
        category: "Session Detail"
        required: false
        options:
          - "Mentor"
          - "Subject Matter Expert"
          - "Presenter"
          - "Other"

      - name: cbmEmail
        type: varchar
        label: "CBM Email"
        description: >
          How the session was conducted. Required when status =
          Completed (workflow-validated post-deployment per Session
          Entity PRD Implementation Note 8 — see MANUAL-CONFIG.md
          MN-MC-CR-001). Drives conditional visibility of
          meetingLocationType. See PRD MN-ENGAGE-DAT-026.
        category: "Session Detail"
        required: false
        

      - name: industrySector
        type: enum
        label: "Industry Sector"
        description: >
          Primary NAICS top-level industry sector. 20 standard
          United States Census Bureau NAICS two-digit sector titles
          per MR-Y9-EXC-001 (cross-entity alignment requirement —
          values match Mentor Contact.industrySectors). Drives the
          Industry Subsector dependent filter. Visible only when
          accountType has Client. See PRD MN-INTAKE-DAT-006.
        category: "Client Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }
        options:
          - "Agriculture, Forestry, Fishing and Hunting"
          - "Mining, Quarrying, and Oil and Gas Extraction"
          - "Utilities"
          - "Construction"
          - "Manufacturing"
          - "Wholesale Trade"
          - "Retail Trade"
          - "Transportation and Warehousing"
          - "Information"
          - "Finance and Insurance"
          - "Real Estate and Rental and Leasing"
          - "Professional, Scientific, and Technical Services"
          - "Management of Companies and Enterprises"
          - "Administrative and Support and Waste Management"
          - "Educational Services"
          - "Health Care and Social Assistance"
          - "Arts, Entertainment, and Recreation"
          - "Accommodation and Food Services"
          - "Other Services (except Public Administration)"
          - "Public Administration"

      - name: mentoringFocusAreas
        type: multiEnum
        label: "Mentoring Focus Areas"
        description: >
          Areas where the client seeks mentoring assistance. Primary
          matching criterion — compared against Mentor Contact's
          mentoringFocusAreas. The 42-value list is adopted from
          MR-Contact.yaml verbatim per the cross-entity alignment
          requirement (Engagement value set must match Mentor Contact
          value set). See PRD MN-INTAKE-DAT-018 and EXCEPTIONS.md
          MN-Y9-EXC-002 for the value list provenance.
        category: "Mentoring Context"
        required: false
        options:
          - "Accounting & Tax Services"
          - "Advertising, Design, & Marketing"
          - "Agriculture"
          - "Animal & Veterinary Services"
          - "Architecture, Engineering, & Related Services"
          - "Arts, Entertainment, & Recreation"
          - "Auto Repair & Mechanic"
          - "Beauty, Cosmetics & Salon Services"
          - "Business Consulting & Coaching"
          - "Childcare"
          - "Commercial & Residential Services"
          - "Construction"
          - "Counseling & Therapy"
          - "Distribution & Transportation of Goods"
          - "Education"
          - "Farming & Livestock"
          - "Fine Arts, Artisan, & Craft Work"
          - "Fishing & Hunting"
          - "Food & Beverage"
          - "Forestry"
          - "Funeral & Death Care Services"
          - "Information Technology"
          - "Manufacturing"
          - "Media & Publishing"
          - "Mining, Quarry, & Utilities"
          - "Nonprofit"
          - "Personal Care Services"
          - "Photography & Video Services"
          - "Professional Services"
          - "Public Relations & Communications"
          - "Real Estate"
          - "Recruiting & Staffing"
          - "Rental & Leasing"
          - "Restaurant & Bar"
          - "Retail"
          - "Social Assistance & Family Services"
          - "Transportation"
          - "Travel, Hospitality, & Tourism"
          - "Warehousing"
          - "Waste Management & Disposal"
          - "Website Development"
          - "Wellness, Healthcare, & Home Health"


      - name: mentoringWhyInterested
        type: wysiwyg
        label: "Why Interested in Mentoring"
        description: >
          The client's own description of what they are looking for
          in this engagement. Entered during MN-INTAKE; referenced
          during MN-MATCH and throughout the engagement. See PRD
          MN-INTAKE-DAT-019.
        category: "Mentoring Context"
        required: false

      - name: mentorProfessionalBio
        type: wysiwyg
        label: "Professional Bio"
        description: >
          The client's own description of what they are looking for
          in this engagement. Entered during MN-INTAKE; referenced
          during MN-MATCH and throughout the engagement. See PRD
          MN-INTAKE-DAT-019.
        category: "Mentoring Context"
        required: false

      - name: mentoringSkills
        type: wysiwyg
        label: "Mentoring Skills"
        description: >
          The client's own description of what they are looking for
          in this engagement. Entered during MN-INTAKE; referenced
          during MN-MATCH and throughout the engagement. See PRD
          MN-INTAKE-DAT-019.
        category: "Mentoring Context"
        required: false

      - name: mentorStartDate
        type: date
        label: "Mentor Start Date"
        description: >
          Expected end date for an On-Hold period. Conditionally
          required and visible when engagementStatus = On-Hold per
          ENG-DEC-006 and Section 5.1. Used by MN-INACTIVE as the
          comparison date for On-Hold engagements instead of
          lastSessionDate. See PRD MN-ENGAGE-DAT-036.
        category: "Mentoring Context"
        required: false

      - name: felonyConfiction
        type: bool
        label: "Felony Conviction"
        description: >
          Whether the engagement resulted in a significant
          employment increase. See PRD MN-CLOSE-DAT-017.
        category: "Engagement Outcomes"
        required: false
 
      - name: howDidYouHearAboutCBM
        type: varchar
        label: "How did you hear about CBM?"
        description: >
          How the session was conducted. Required when status =
          Completed (workflow-validated post-deployment per Session
          Entity PRD Implementation Note 8 — see MANUAL-CONFIG.md
          MN-MC-CR-001). Drives conditional visibility of
          meetingLocationType. See PRD MN-ENGAGE-DAT-026.
        category: "Session Detail"
        required: false

      - name: yearsOfExperience
        type: int
        label: "Years of Industry Experience"
        description: >
          Total count of completed sessions for this engagement.
          Aggregate roll-up of Session records via parent link with
          status = Completed. See PRD MN-ENGAGE-DAT-018 and
          ENG-DEC-003.
        category: "Session Analytics"
        required: false

      - name: fluentLanguages
        type: multiEnum
        label: "Fluent Languages"
        description: >
          Languages the mentor is fluent in. Used to match clients
          who prefer to work in a language other than English. 36
          values per MR-Y9-EXC-004. See PRD MR-APPLY-DAT-017.
        category: "Expertise and Matching"
        required: false
        options:
          - "American Sign Language"
          - "Arabic"
          - "Bengali"
          - "Cantonese"
          - "Chinese"
          - "Czech"
          - "Danish"
          - "Dutch"
          - "English"
          - "French"
          - "German"
          - "Greek"
          - "Gujarati"
          - "Hebrew"
          - "Hindi"
          - "Hungarian"
          - "Indonesian"
          - "Italian"
          - "Japanese"
          - "Korean"
          - "Lithuanian"
          - "Malay"
          - "Mandarin"
          - "Marathi"
          - "Norwegian"
          - "Pashto"
          - "Polish"
          - "Portuguese"
          - "Punjabi"
          - "Russian"
          - "Spanish"
          - "Swedish"
          - "Tagalog"
          - "Telugu"
          - "Urdu"
          - "Other"

      - name: trainingCompleted
        type: bool
        label: "Training Completed"
        description: >
          Whether the mentor has completed required training
          modules. Populated by the LMS integration when available;
          manually set by the Mentor Administrator as a fallback.
          Marked externallyPopulated so seed-data and verification
          skip it. See PRD MR-ONBOARD-DAT-002 and MANUAL-CONFIG.md
          MR-MC-IN-001.
        category: "Application and Compliance"
        required: false
        externallyPopulated: true

      - name: trainingCompletionDate
        type: date
        label: "Training Completion Date"
        description: >
          Date required training was completed. LMS-populated or
          manually set as fallback. Paired with trainingCompleted.
          See PRD MR-ONBOARD-DAT-003.
        category: "Application and Compliance"
        required: false
        externallyPopulated: false

      - name: ethicsAgreementAccepted
        type: bool
        label: "Ethics Agreement Accepted"
        description: >
          Whether the mentor has accepted the current CBM ethics
          agreement. Set by the Mentor Administrator after the
          mentor completes the external acceptance process.
          Admin-only, read-only for mentors. Triggers the
          ethics-acceptance-timestamp workflow above. See PRD
          MR-ONBOARD-DAT-004.
        category: "Application and Compliance"
        required: false

      - name: ethicsAgreementAcceptanceDateTime
        type: datetime
        label: "Ethics Agreement Acceptance Date/Time"
        description: >
          Date and time of the mentor's ethics agreement
          acceptance. Populated by the ethics-acceptance-timestamp
          workflow. Admin-only. See PRD MR-ONBOARD-DAT-005.
        category: "Application and Compliance"
        required: false
        readOnly: false

      - name: backgroundCheckCompleted
        type: bool
        label: "Background Check Completed"
        description: >
          Whether a background check has been completed.
          Conditional-required (only populated when the Mentor
          Administrator determines a background check is required) —
          this trigger is operational rather than a record-state
          condition expressible in YAML, so requiredWhen is not
          set. Admin-only, hidden from mentors. See PRD
          MR-ONBOARD-DAT-006.
        category: "Application and Compliance"
        required: false
        readOnly: false

      - name: backgroundCheckDate
        type: date
        label: "Background Check Date"
        description: >
          Date the background check was completed. Conditional —
          only populated when a background check is conducted.
          Admin-only, hidden from mentors. See PRD
          MR-ONBOARD-DAT-007.
        category: "Application and Compliance"
        required: false
        readOnly: false

      - name: departureReason
        type: enum
        label: "Departure Reason"
        description: >
          Reason the mentor exited CBM. Set by the Mentor
          Administrator at departure. Cleared on reactivation by
          the clear-departure-on-reactivation workflow. Visible
          when mentorStatus is Resigned or Departed per
          MR-MC-DL-004. See PRD MR-DEPART-DAT-002.
        category: "Lifecycle and Status"
        required: false
        visibleWhen:
          - { field: mentorStatus, op: in, value: ["Resigned", "Departed"] }
        options:
          - "Relocated"
          - "Career Change"
          - "Time Constraints"
          - "Personal"
          - "Other"

      - name: departureDate
        type: date
        label: "Departure Date"
        description: >
          Date the mentor departed. Set by the Mentor Administrator
          at departure. Cleared on reactivation by the
          clear-departure-on-reactivation workflow. Visible when
          mentorStatus is Resigned or Departed. See PRD
          MR-DEPART-DAT-003.
        category: "Lifecycle and Status"
        required: false
        visibleWhen:
          - { field: mentorStatus, op: in, value: ["Resigned", "Departed"] }

      - name: maximumClientCapacity
        type: int
        label: "Maximum Client Capacity"
        description: >
          Maximum number of simultaneous active client engagements.
          Initially set by Mentor Administrator during onboarding.
          Mentor-editable after activation. Admin-overridable. See
          PRD MR-ONBOARD-DAT-009.
        category: "Capacity and Availability"
        required: false

      - name: acceptingNewClients
        type: bool
        label: "Accepting New Clients"
        description: >
          Whether the mentor is available for new client
          assignments. Set to Yes during onboarding. Set to No
          automatically when status changes to Paused or Inactive
          via the pause-stops-new-clients workflow above.
          Mentor-editable when Active. Admin-overridable. See PRD
          MR-ONBOARD-DAT-010.
        category: "Capacity and Availability"
        required: true

      - name: currentActiveClients
        type: int
        label: "Current Active Clients"
        description: >
          Count of Engagements where this mentor is the assigned
          mentor and engagementStatus is Active or Assigned.
          System-calculated via aggregate roll-up using the
          engagementAssignedMentor relationship (link name:
          assignedMentor on Engagement side). See PRD
          MR-MANAGE-DAT-019.
        category: "Capacity and Availability"
        required: false
        readOnly: true
        formula:
          type: aggregate
          function: count
          relatedEntity: Engagement
          via: assignedMentor
          where:
            - { field: engagementStatus, op: in, value: ["Active", "Assigned"] }

      - name: availableCapacity
        type: int
        label: "Available Capacity"
        description: >
          Maximum Client Capacity minus Current Active Clients.
          System-calculated arithmetic formula. See PRD
          MR-MANAGE-DAT-020.
        category: "Capacity and Availability"
        required: false
        readOnly: true
        formula:
          type: arithmetic
          expression: "maximumClientCapacity - currentActiveClients"

      # --- Section 4.9 — Mentor Analytics ---

      - name: totalLifetimeSessions
        type: int
        label: "Total Lifetime Sessions"
        description: >
          Count of all completed sessions across all of this
          mentor's engagements. Multi-hop aggregate roll-up via
          Session → Engagement → Contact (assignedMentor). See PRD
          MR-MANAGE-DAT-021.
        category: "Mentor Analytics"
        required: false
        readOnly: true
        formula:
          type: aggregate
          function: count
          relatedEntity: Session
          via: assignedMentor
          join:
            - { from: Session, link: parent, to: Engagement }
          where:
            - { field: status, op: equals, value: "Completed" }

      - name: totalMentoringHours
        type: float
        label: "Total Mentoring Hours"
        description: >
          Sum of session duration (minutes) across completed
          Session records. Stored as minutes; report layer divides
          by 60 for the human-friendly hours display. Multi-hop
          aggregate via Session → Engagement → Contact
          (assignedMentor). See PRD MR-MANAGE-DAT-022.
        category: "Mentor Analytics"
        required: false
        readOnly: true
        formula:
          type: aggregate
          function: sum
          field: duration
          relatedEntity: Session
          via: assignedMentor
          join:
            - { from: Session, link: parent, to: Engagement }
          where:
            - { field: status, op: equals, value: "Completed" }

      - name: totalSessionsLast30Days
        type: int
        label: "Total Sessions (Last 30 Days)"
        description: >
          Count of completed sessions in the last 30 days across
          all of this mentor's engagements. Used by the
          mentor-inactivity-alert saved view. Multi-hop aggregate
          using Section 11 relative-date vocabulary. See PRD
          MR-MANAGE-DAT-023.
        category: "Mentor Analytics"
        required: false
        readOnly: true
        formula:
          type: aggregate
          function: count
          relatedEntity: Session
          via: assignedMentor
          join:
            - { from: Session, link: parent, to: Engagement }
          where:
            - { field: status,    op: equals,             value: "Completed" }
            - { field: dateStart, op: greaterThanOrEqual, value: "lastNDays:30" }

      # --- Section 4.10 — Board and Organizational ---

      - name: boardPosition
        type: varchar
        label: "Board Position"
        description: >
          The mentor's title or role on the CBM board (e.g., Board
          Chair, Treasurer). Visible for CBM organizational member
          types. Populated by the Mentor Administrator. See PRD
          MR-MANAGE-DAT-025 and Contact Entity PRD v1.7
          Section 3.2.
        category: "Board and Organizational"
        required: false

      # --- Section 4.11 — Dues Summary ---

      - name: duesStatus
        type: enum
        label: "Dues Status"
        description: >
          Summary field on the Contact record reflecting the
          mentor's current-year dues standing. Set by the Mentor
          Administrator. Maintained independently of individual
          Dues records (see Dues entity). Admin-only, read-only
          for mentors (field-level access control configured
          post-deployment per MANUAL-CONFIG.md MR-MC-AC-001). See
          PRD MR-MANAGE-DAT-026.
        category: "Dues Summary"
        required: false
        options:
          - "Unpaid"
          - "Paid"
          - "Waived"
        style:
          "Unpaid": "warning"
          "Paid": "success"
          "Waived": "default"

      - name: duesPaymentDate
        type: date
        label: "Dues Payment Date"
        description: >
          Date of most recent dues payment. Not applicable when
          duesStatus = Waived. Admin-only. See PRD
          MR-MANAGE-DAT-027.
        category: "Dues Summary"
        required: false

      - name: duesRenewalDate
        type: date
        label: "Dues Renewal Date"
        description: >
          The mentor's annual dues renewal date, derived from
          their activation anniversary. Used by the Mentor
          Administrator to determine when to create each year's
          Dues record. Maintained per DUES-DEC-005 / Contact
          Entity PRD v1.7 Section 3.3 Dues subsection. New in
          MR-Contact v2.0.0 — was previously surfaced only in
          MANUAL-CONFIG.md MR-MC-WF-009.
        category: "Dues Summary"
        required: false



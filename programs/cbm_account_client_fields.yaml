version: "1.0"
content_version: "1.0.0"
description: "CBM EspoCRM Configuration — Account: Client Company variant"

# Source: CBM-PRD-CRM-Client.docx v1.6 — Section 2.2
# Generated: March 2026
# PRD Reference: CBM-PRD-CRM-Client.docx

# MANUAL CONFIG REQUIRED:
# - Company Role field values: Define complete list with Leadership
# - Mentoring Focus Areas values: Define complete list with Leadership
# - Revenue Range values: Define specific ranges with Leadership
# - NAICS Sector and Subsector dropdowns: Load full NAICS taxonomy
# - Cascading NAICS Subsector filter (filtered by Sector): Entity Manager → Account → Dynamic Logic
# - State of Registration shown when Registered with State = Yes: Dynamic Logic
# - Legal Business Structure shown when Registered with State = Yes: Dynamic Logic
# - EIN on File shown when Registered with State = Yes: Dynamic Logic
# - Date of Formation shown when Registered with State = Yes: Dynamic Logic
# - Registered Agent shown when Registered with State = Yes: Dynamic Logic
# - EIN Number field-level security (Admin + assigned Primary Mentor only): Administration → Roles
# - Role-based access control: Administration → Roles (see CBM-PRD-CRM-Client.docx Section 5)

entities:
  Account:
    description: >
      Represents a business being mentored by CBM, as well as partner
      organizations and sponsors. The Company Role field differentiates
      between types. A single company can hold multiple roles (e.g.,
      both a Client and a Partner). Companies are the anchor record to
      which all Contacts, Engagements, and related activity are linked
      for the mentoring process.
      PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

    fields:

      # ---------------------------------------------------------------
      # CORE IDENTITY
      # ---------------------------------------------------------------

      - name: website
        type: url
        label: "Website"
        category: "Overview"
        description: >
          Business website URL. Optional — may be blank for pre-startup
          applicants.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

      - name: organizationType
        type: enum
        label: "Organization Type"
        required: true
        category: "Overview"
        description: >
          Whether the business is a for-profit or non-profit entity.
          Required. Used for analytics and grant reporting.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.
        options:
          - "For-Profit"
          - "Non-Profit"

      - name: companyRole
        type: multiEnum
        label: "Company Role"
        required: true
        category: "Overview"
        description: >
          The role(s) this company plays in CBM. A single company can
          be multiple types simultaneously — e.g., both a Client and
          a Partner. Used for filtering, analytics, and access control.
          TBD: Complete list of values to be defined by Leadership.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.
        options:
          - "Client"
          - "Partner"
          - "Sponsor"
          - "TBD - Additional values to be defined"

      # ---------------------------------------------------------------
      # BUSINESS PROFILE
      # ---------------------------------------------------------------

      - name: businessStage
        type: enum
        label: "Business Stage"
        required: true
        category: "Business Profile"
        description: >
          Current stage of business development. Required. Used for
          mentor matching and program analytics. Note: Revenue thresholds
          to differentiate Startup from Early Stage are a planned future
          enhancement.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.
        options:
          - "Pre-Startup"
          - "Startup"
          - "Early Stage"
          - "Growth Stage"
          - "Established"

      - name: naicsSector
        type: enum
        label: "NAICS Sector"
        required: true
        category: "Business Profile"
        description: >
          Top-level industry classification using the North American
          Industry Classification System (NAICS). Dropdown of 20 NAICS
          sectors. Required. Used for mentor matching and reporting.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.
        options:
          - "Agriculture, Forestry, Fishing and Hunting"
          - "Mining, Quarrying, and Oil and Gas Extraction"
          - "Utilities"
          - "Construction"
          - "Manufacturing"
          - "Wholesale Trade"
          - "Retail Trade"
          - "Transportation and Warehousing"
          - "Information"
          - "Finance and Insurance"
          - "Real Estate and Rental and Leasing"
          - "Professional, Scientific, and Technical Services"
          - "Management of Companies and Enterprises"
          - "Administrative and Support and Waste Management"
          - "Educational Services"
          - "Health Care and Social Assistance"
          - "Arts, Entertainment, and Recreation"
          - "Accommodation and Food Services"
          - "Other Services (except Public Administration)"
          - "Public Administration"

      - name: naicsSubsector
        type: enum
        label: "NAICS Subsector"
        required: true
        category: "Business Profile"
        description: >
          Second-level industry classification. Filtered by selected
          NAICS Sector. Required. Both Sector and Subsector stored as
          separate fields.
          MANUAL CONFIG: Configure Dynamic Logic to filter subsector
          options based on selected sector.
          TBD: Full subsector list (~100 values) to be loaded.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.
        options:
          - "TBD - Full NAICS subsector list to be loaded"

      - name: mentoringFocusAreas
        type: multiEnum
        label: "Mentoring Focus Areas"
        required: true
        category: "Business Profile"
        description: >
          The specific business areas where the client is seeking
          mentoring support. Multi-select. Used for mentor matching
          and funder reporting.
          TBD: Values to be defined by CBM Leadership.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.
        options:
          - "TBD - Values to be defined by Leadership"

      - name: mentoringNeedsDescription
        type: wysiwyg
        label: "Mentoring Needs Description"
        required: true
        category: "Business Profile"
        description: >
          Free-form description of what the client is looking for in
          a mentoring engagement. Rich text. Required. Collected on
          the intake form.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

      # ---------------------------------------------------------------
      # BUSINESS DETAIL (Mentor-Populated)
      # ---------------------------------------------------------------

      - name: businessDescription
        type: wysiwyg
        label: "Business Description"
        category: "Business Detail"
        description: >
          Detailed description of what the business does, its history,
          and founding story. Rich text. Optional. Typically completed
          by the mentor after assignment.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

      - name: timeInOperation
        type: enum
        label: "Time in Operation"
        category: "Business Detail"
        description: >
          How long the business has been operating. Optional.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.
        options:
          - "Less than 1 year"
          - "1-2 years"
          - "2-5 years"
          - "5-10 years"
          - "More than 10 years"

      - name: currentTeamSize
        type: int
        label: "Current Team Size"
        min: 0
        category: "Business Detail"
        description: >
          Number of current employees or team members. Optional.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

      - name: revenueRange
        type: enum
        label: "Revenue Range"
        category: "Business Detail"
        description: >
          Approximate annual revenue range. Optional.
          TBD: Specific ranges to be defined by Leadership.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.
        options:
          - "Pre-Revenue"
          - "TBD - Revenue ranges to be defined"

      - name: fundingSituation
        type: wysiwyg
        label: "Funding Situation"
        category: "Business Detail"
        description: >
          Description of current funding sources or needs. Rich text.
          Optional.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

      - name: currentChallenges
        type: wysiwyg
        label: "Current Challenges"
        category: "Business Detail"
        description: >
          Description of the primary obstacles the business is facing.
          Rich text. Optional.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

      - name: goalsAndObjectives
        type: wysiwyg
        label: "Goals and Objectives"
        category: "Business Detail"
        description: >
          What the client wants to achieve through the mentoring
          engagement. Rich text. Optional.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

      - name: desiredOutcomes
        type: wysiwyg
        label: "Desired Outcomes (6-12 Months)"
        category: "Business Detail"
        description: >
          Specific outcomes the client hopes to achieve within the near
          term. Rich text. Optional.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

      - name: previousMentoringExperience
        type: wysiwyg
        label: "Previous Mentoring / Advisory Experience"
        category: "Business Detail"
        description: >
          Whether the client has worked with a mentor or advisor before,
          and any relevant context. Rich text. Optional.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

      - name: currentProfessionalAdvisors
        type: multiEnum
        label: "Current Professional Advisors"
        category: "Business Detail"
        description: >
          Types of professional advisors the client currently engages.
          Multi-select checklist. Optional.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.
        options:
          - "Banker / Financial Institution"
          - "Attorney / Legal Counsel"
          - "Accountant / CPA"
          - "IT Consultant"
          - "Insurance Agent"
          - "Marketing / PR Consultant"
          - "Business Coach"

      # ---------------------------------------------------------------
      # LEGAL & REGISTRATION
      # ---------------------------------------------------------------

      - name: registeredWithState
        type: bool
        label: "Registered with State"
        category: "Legal & Registration"
        description: >
          Whether the business has filed with the state as an official
          legal entity. Yes/No. Optional. Drives visibility of
          registration-related fields via Dynamic Logic.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

      - name: stateOfRegistration
        type: enum
        label: "State of Registration"
        category: "Legal & Registration"
        description: >
          State where the business is registered. Dropdown of US states.
          Shown when Registered with State = Yes. Optional.
          MANUAL CONFIG: Configure Dynamic Logic to show when
          registeredWithState = true.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.
        options:
          - "Alabama"
          - "Alaska"
          - "Arizona"
          - "Arkansas"
          - "California"
          - "Colorado"
          - "Connecticut"
          - "Delaware"
          - "Florida"
          - "Georgia"
          - "Hawaii"
          - "Idaho"
          - "Illinois"
          - "Indiana"
          - "Iowa"
          - "Kansas"
          - "Kentucky"
          - "Louisiana"
          - "Maine"
          - "Maryland"
          - "Massachusetts"
          - "Michigan"
          - "Minnesota"
          - "Mississippi"
          - "Missouri"
          - "Montana"
          - "Nebraska"
          - "Nevada"
          - "New Hampshire"
          - "New Jersey"
          - "New Mexico"
          - "New York"
          - "North Carolina"
          - "North Dakota"
          - "Ohio"
          - "Oklahoma"
          - "Oregon"
          - "Pennsylvania"
          - "Rhode Island"
          - "South Carolina"
          - "South Dakota"
          - "Tennessee"
          - "Texas"
          - "Utah"
          - "Vermont"
          - "Virginia"
          - "Washington"
          - "West Virginia"
          - "Wisconsin"
          - "Wyoming"
          - "Washington D.C."

      - name: legalBusinessStructure
        type: enum
        label: "Legal Business Structure"
        category: "Legal & Registration"
        description: >
          Legal structure of the registered business. Shown when
          Registered with State = Yes. Optional.
          MANUAL CONFIG: Configure Dynamic Logic to show when
          registeredWithState = true.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.
        options:
          - "Sole Proprietor"
          - "Partnership"
          - "LLC"
          - "S-Corp"
          - "C-Corp"
          - "Non-Profit 501(c)(3)"
          - "Other"

      - name: einOnFile
        type: bool
        label: "EIN on File"
        category: "Legal & Registration"
        description: >
          Whether the business has obtained an Employer Identification
          Number. Shown when Registered with State = Yes. Optional.
          MANUAL CONFIG: Configure Dynamic Logic to show when
          registeredWithState = true.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

      - name: dateOfFormation
        type: date
        label: "Date of Formation"
        category: "Legal & Registration"
        description: >
          Date the business entity was formally established. Shown when
          Registered with State = Yes. Optional.
          MANUAL CONFIG: Configure Dynamic Logic to show when
          registeredWithState = true.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

      - name: registeredAgent
        type: bool
        label: "Registered Agent"
        category: "Legal & Registration"
        description: >
          Whether the business has a designated registered agent. Shown
          when Registered with State = Yes. Optional.
          MANUAL CONFIG: Configure Dynamic Logic to show when
          registeredWithState = true.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.

      - name: einNumber
        type: varchar
        label: "EIN Number"
        maxLength: 20
        category: "Legal & Registration"
        description: >
          The actual EIN number if deemed relevant by the mentor. Text
          field. RESTRICTED: Admin and assigned Primary Mentor access
          only. Not collected on intake form — mentor-populated only.
          MANUAL CONFIG: Configure field-level security in
          Administration → Roles.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 5.2.

      # ---------------------------------------------------------------
      # CERTIFICATIONS & CLASSIFICATIONS
      # ---------------------------------------------------------------

      - name: veteranOwnedBusiness
        type: enum
        label: "Veteran-Owned Business"
        category: "Certifications"
        description: >
          Whether the business is majority-owned by one or more veterans.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.
        options:
          - "Ineligible"
          - "Eligible"
          - "Certified"
          - "In Progress"

      - name: sdvosb
        type: enum
        label: "Service-Disabled Veteran-Owned (SDVOSB)"
        category: "Certifications"
        description: >
          SBA/VA certification for businesses majority-owned by
          service-disabled veterans.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.
        options:
          - "Ineligible"
          - "Eligible"
          - "Certified"
          - "In Progress"

      - name: wosb
        type: enum
        label: "Woman-Owned Small Business (WOSB)"
        category: "Certifications"
        description: >
          SBA certification for businesses majority-owned and controlled
          by women.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.
        options:
          - "Ineligible"
          - "Eligible"
          - "Certified"
          - "In Progress"

      - name: mbe
        type: enum
        label: "Minority-Owned Business Enterprise (MBE)"
        category: "Certifications"
        description: >
          Certification for businesses majority-owned by racial or
          ethnic minorities, typically through NMSDC or a state/local
          certifying agency.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.
        options:
          - "Ineligible"
          - "Eligible"
          - "Certified"
          - "In Progress"

      - name: dbe
        type: enum
        label: "Disadvantaged Business Enterprise (DBE)"
        category: "Certifications"
        description: >
          Federal DOT certification for socially and economically
          disadvantaged business owners.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.
        options:
          - "Ineligible"
          - "Eligible"
          - "Certified"
          - "In Progress"

      - name: sbaSmallBusiness
        type: enum
        label: "SBA Small Business"
        category: "Certifications"
        description: >
          Whether the business meets SBA size standards and is registered
          as a small business in SAM.gov.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.
        options:
          - "Ineligible"
          - "Eligible"
          - "Certified"
          - "In Progress"

      - name: hubzoneCertified
        type: enum
        label: "HUBZone Certified"
        category: "Certifications"
        description: >
          SBA certification for businesses in Historically Underutilized
          Business Zones.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.
        options:
          - "Ineligible"
          - "Eligible"
          - "Certified"
          - "In Progress"

      - name: eightA
        type: enum
        label: "8(a) Program Participant"
        category: "Certifications"
        description: >
          SBA 8(a) Business Development Program for socially and
          economically disadvantaged small business owners.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.
        options:
          - "Ineligible"
          - "Eligible"
          - "Certified"
          - "In Progress"

      - name: lgbtqOwnedBusiness
        type: enum
        label: "LGBTQ+-Owned Business"
        category: "Certifications"
        description: >
          Certification for businesses majority-owned by LGBTQ+
          individuals, typically through NGLCC.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.
        options:
          - "Ineligible"
          - "Eligible"
          - "Certified"
          - "In Progress"

      - name: dobe
        type: enum
        label: "Disability-Owned Business Enterprise (DOBE)"
        category: "Certifications"
        description: >
          Certification for businesses majority-owned by people with
          disabilities, through Disability:IN.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.
        options:
          - "Ineligible"
          - "Eligible"
          - "Certified"
          - "In Progress"

      - name: nativeAmericanOwned
        type: enum
        label: "Native American / Tribal Owned"
        category: "Certifications"
        description: >
          Business majority-owned by Native American, Alaska Native, or
          Native Hawaiian individuals or a tribal entity.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.
        options:
          - "Ineligible"
          - "Eligible"
          - "Certified"
          - "In Progress"

      - name: certifiedBCorp
        type: enum
        label: "Certified B Corporation"
        category: "Certifications"
        description: >
          B Lab certification for businesses meeting verified social,
          environmental, and governance standards.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.
        options:
          - "Ineligible"
          - "Eligible"
          - "Certified"
          - "In Progress"

      - name: unionShop
        type: bool
        label: "Union Shop"
        category: "Certifications"
        description: >
          Whether the business operates under a union agreement requiring
          employees to be union members. Optional.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.

      - name: familyOwnedBusiness
        type: bool
        label: "Family-Owned Business"
        category: "Certifications"
        description: >
          Whether the business is owned and operated by members of the
          same family. Optional.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.

      - name: franchise
        type: bool
        label: "Franchise"
        category: "Certifications"
        description: >
          Whether this business operates as a franchise of a larger
          brand or system. Optional.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.

      - name: socialEnterprise
        type: bool
        label: "Social Enterprise"
        category: "Certifications"
        description: >
          Whether the business has a primary social, environmental, or
          community mission alongside its commercial activity. Optional.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.

      - name: otherCertifications
        type: text
        label: "Other Certifications / Designations"
        category: "Certifications"
        description: >
          Free-text field for any additional certifications, designations,
          or ownership classifications not covered by the structured
          fields above. Optional.
          PRD Reference: CBM-PRD-CRM-Client.docx Section 2.2.3.

    layout:
      detail:
        panels:

          - label: "Overview"
            tabBreak: true
            tabLabel: "Overview"
            style: default
            rows:
              - [name, companyRole]
              - [organizationType, businessStage]
              - [website, phoneNumber]
              - [billingAddressCity, null]

          - label: "Business Profile"
            tabBreak: true
            tabLabel: "Profile"
            style: default
            description: >
              Core business information required for mentor matching
              and program intake.
            rows:
              - [naicsSector, naicsSubsector]
              - [mentoringFocusAreas, null]
              - [mentoringNeedsDescription, null]

          - label: "Business Detail"
            tabBreak: true
            tabLabel: "Detail"
            style: default
            description: >
              Additional business context. Typically completed by the
              mentor after assignment.
            tabs:
              - label: "Operations"
                category: "Business Detail"

          - label: "Legal & Registration"
            tabBreak: true
            tabLabel: "Legal"
            style: default
            description: >
              Legal entity and registration information. Registration
              details shown when Registered with State is checked.
            rows:
              - [registeredWithState, null]
              - [stateOfRegistration, legalBusinessStructure]
              - [dateOfFormation, einOnFile]
              - [registeredAgent, einNumber]

          - label: "Certifications"
            tabBreak: true
            tabLabel: "Certifications"
            style: default
            description: >
              Business ownership designations and certifications.
              Important for grant compliance and program eligibility.
            tabs:
              - label: "Classifications"
                category: "Certifications"

      list:
        columns:
          - field: name
            width: 25
          - field: companyRole
            width: 12
          - field: businessStage
            width: 13
          - field: billingAddressCity
            width: 15
          - field: website
            width: 20
          - field: phoneNumber
            width: 15

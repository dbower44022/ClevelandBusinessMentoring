    formulaScript:
      beforeSaveCustomScript: 'currentActiveClients = 1;

        availableCapacity = maximumClientCapacity - currentActiveClients ;

        '
      beforeSaveApiScript: "// Only act when Mentor Status is Active\nifThen(\n  mentorStatus == 'Active',\n\n  // Set Mentor\
        \ Start Date to today if not already set\n  ifThen(\n    mentorStartDate == null,\n    mentorStartDate = datetime\\\
        today()\n  );\n\n  // Ensure the Contact's Assigned User is the mentor's own User account\n  $contactId = contactRecordId;\n\
        \  ifThen(\n    $contactId != null,\n\n    $userId = record\\findOne('User', 'createdAt', 'asc', 'contactId=', $contactId);\n\
        \    ifThen(\n      $userId != null,\n      $currentAssigned = record\\attribute('Contact', $contactId, 'assignedUserId');\n\
        \      ifThen(\n        $currentAssigned != $userId,\n        record\\update('Contact', $contactId, 'assignedUserId',\
        \ $userId)\n      )\n    )\n  )\n);"

version: "1.0"
content_version: "1.0.0"
description: >
  Mentoring (MN) domain — Session custom entity definition. Six
  custom fields plus three manyToMany / manyToOne relationships.
  Single-domain entity owned exclusively by MN. Uses the Event
  entity type so dateStart, dateEnd, duration, status, and the
  parent link to Engagement are all native and require no YAML
  declaration. The native Event status field requires
  CBM-specific options (seven session-specific values replacing
  platform defaults) — schema does not express native-field option
  override, captured in MANUAL-CONFIG.md MN-MC-SC-001. Sessions
  are never deleted; rescheduling preserves the original via the
  rescheduledFromSession self-referential link per
  MN-ENGAGE-REQ-008.

# Source: Mentoring Domain Product Requirements Document v1.0
#         (04-01-26), Section 4 (Session entity). Session Entity
#         Product Requirements Document v1.1 (04-15-26 23:20).
#         MN-ENGAGE v2.3.

entities:

  # ---------------------------------------------------------------
  # Custom entity — Session
  # ---------------------------------------------------------------

  Session:
    description: >
      Individual mentoring meetings within an Engagement. Created
      and managed during MN-ENGAGE. Uses the Event type, so
      dateStart (= Session Date/Time), dateEnd (calculated as
      dateStart + duration; read-only), duration (minutes),
      status (custom seven-value enum), and parent (link to
      Engagement) are inherited per SES decisions 1–3, 8.
      Activity stream enabled per Session Entity PRD Section 1.
      Auto-generated name "{Engagement Name} — {Session Date}" is
      implemented via post-deployment automation per SES-DEC-004
      (see MANUAL-CONFIG.md MN-MC-AA-007). The first Session
      reaching Completed status auto-transitions the parent
      Engagement to Active per MN-ENGAGE-REQ-001 — implemented
      via post-deployment automation (MANUAL-CONFIG.md
      MN-MC-AA-008). Mentor / Client attendee minimum-of-one
      enforcement at Completed status is implemented via
      post-deployment workflow validation per Session Entity PRD
      Implementation Note 8 (MANUAL-CONFIG.md MN-MC-AA-009).
    action: create
    type: Event
    settings:
      labelSingular: "Session"
      labelPlural: "Sessions"
      stream: true
      disabled: false
      # Session.name is auto-generated by post-deployment automation
      # (SES-DEC-004 — "{Engagement Name} — {Session Date}"). Until that
      # automation is in place, leave autoPlaceName at the default true
      # so the user can supply name manually if needed at create time.

    fields:

      # --- Section 3.1 — Session Detail Fields ---

      - name: sessionType
        type: enum
        label: "Session Type"
        description: >
          How the session was conducted. Required when status =
          Completed (workflow-validated post-deployment per Session
          Entity PRD Implementation Note 8 — see MANUAL-CONFIG.md
          MN-MC-CR-001). Drives conditional visibility of
          meetingLocationType. See PRD MN-ENGAGE-DAT-026.
        category: "Session Detail"
        required: false
        options:
          - "In-Person"
          - "Video Call"
          - "Phone Call"

      - name: meetingLocationType
        type: enum
        label: "Meeting Location Type"
        description: >
          Where an in-person session took place. Visible only when
          sessionType = In-Person per Session Entity PRD Section
          5.1. Conditionally required when sessionType = In-Person
          AND status = Completed (workflow-validated
          post-deployment — MANUAL-CONFIG.md MN-MC-CR-002). See
          PRD MN-ENGAGE-DAT-027.
        category: "Session Detail"
        required: false
        requiredWhen:
          - { field: sessionType, op: equals, value: "In-Person" }
        visibleWhen:
          - { field: sessionType, op: equals, value: "In-Person" }
        options:
          - "Organization Office"
          - "Client's Place of Business"
          - "Other"

      - name: locationDetails
        type: varchar
        label: "Location Details"
        description: >
          Free-text description of the meeting location. Visible
          only when meetingLocationType = Other per Session Entity
          PRD Section 5.2. See PRD MN-ENGAGE-DAT-028.
        category: "Session Detail"
        required: false
        visibleWhen:
          - { field: meetingLocationType, op: equals, value: "Other" }

      - name: topicsCovered
        type: multiEnum
        label: "Topics Covered"
        description: >
          Topics discussed during the session. Included in the
          session summary email when populated. Value list is
          deferred to CBM program leadership per SES-ISS-001 /
          MN-ENGAGE-ISS-002. Empty options list at Phase 9; see
          EXCEPTIONS.md MN-Y9-EXC-004 and MANUAL-CONFIG.md
          MN-MC-OL-001. See PRD MN-ENGAGE-DAT-029.
        category: "Session Detail"
        required: false
        # Empty options list — deferred per EXCEPTIONS.md MN-Y9-EXC-004.
        # Validator accepts via optionsDeferred:true; operator
        # populates the topic taxonomy post-deploy per MANUAL-CONFIG.md
        # MN-MC-OL-001 once CBM program leadership decides on
        # SBA-aligned vs. custom taxonomy per SES-ISS-001 / MN-DEC-019.
        optionsDeferred: true
        options: []

      # --- Section 3.2 — Session Notes and Follow-Up ---

      - name: sessionNotes
        type: wysiwyg
        label: "Session Notes"
        description: >
          Notes entered by the mentor during or after the session.
          Included in the session summary email when populated per
          SES-DEC-006. The mentor controls what is shared by
          choosing what to write in the field. See PRD
          MN-ENGAGE-DAT-030.
        category: "Notes and Follow-Up"
        required: false

      - name: nextSteps
        type: wysiwyg
        label: "Next Steps"
        description: >
          Agreed-upon actions and follow-up items from the session.
          Included in the session summary email when populated per
          SES-DEC-006. See PRD MN-ENGAGE-DAT-031.
        category: "Notes and Follow-Up"
        required: false

      - name: nextSessionDateTime
        type: datetime
        label: "Next Session Date/Time"
        description: >
          The date and time for the next mentoring session. When
          set on a Completed Session, post-deployment automation
          per MN-ENGAGE-REQ-002 (a) creates a new Session record
          at Scheduled status with dateStart = nextSessionDateTime,
          (b) creates a calendar event and sends meeting requests
          to attendees, and (c) copies the value to the parent
          Engagement.nextSessionDateTime roll-up field. The v1.1
          workflow vocabulary cannot express createRelatedRecord;
          all three actions are surfaced in MANUAL-CONFIG.md
          MN-MC-AA-010. See PRD MN-ENGAGE-DAT-033 and SES-DEC-005.
        category: "Notes and Follow-Up"
        required: false

      # Note: the rescheduledFromSession self-referential link is
      # declared in the relationships: block at the bottom of this
      # file. Per the schema rule, type: link is not a valid field
      # type — link relationships go exclusively in the
      # relationships: block.

    layout:

      detail:
        panels:

          - label: "Session Detail"
            description: >
              How and where the session was conducted, plus the
              topics covered. Source: Session Entity PRD v1.1
              Section 3.1.
            tabs:
              - label: "Session Detail"
                category: "Session Detail"

          - label: "Notes and Follow-Up"
            description: >
              Mentor's session notes, agreed-upon next steps, and
              the next session date/time that drives session
              chaining. Source: Session Entity PRD v1.1 Section
              3.2.
            tabs:
              - label: "Notes and Follow-Up"
                category: "Notes and Follow-Up"

      list:
        columns:
          - field: name
            width: 30
          - field: dateStart
            width: 18
          - field: status
            width: 16
          - field: duration
            width: 10
          - field: sessionType
            width: 14
          - field: nextSessionDateTime
            width: 12

# ---------------------------------------------------------------
# Relationships — Session is a child of Engagement
# ---------------------------------------------------------------

relationships:

  # The Session → Engagement parent relationship is implicit via
  # the native Event parent link per SES-DEC-008. No explicit
  # relationship declaration is required for it. The inverse
  # (Engagement.sessions) is consumed by the Engagement
  # roll-up formulas (totalSessions, totalSessionsLast30Days,
  # lastSessionDate, totalSessionHours) via via: parent.

  - name: sessionMentorAttendees
    description: >
      Mentors present at the session. manyToMany — many sessions
      may share a mentor and a session may have multiple mentor
      attendees. At least one required when status = Completed
      (workflow-enforced per Session Entity PRD Implementation
      Note 8 — MANUAL-CONFIG.md MN-MC-CR-003). Pattern matches
      Engagement.additionalMentors per SES-DEC-009. See PRD
      MN-ENGAGE-DAT-034.
    entity: Session
    entityForeign: Contact
    linkType: manyToMany
    link: mentorAttendees
    linkForeign: sessionsAsMentorAttendee
    relationName: sessionMentorAttendees
    label: "Mentor Attendees"
    labelForeign: "Sessions (as Mentor Attendee)"
    audited: false

  - name: sessionClientAttendees
    description: >
      Client contacts present at the session. manyToMany. At least
      one required when status = Completed (workflow-enforced —
      MANUAL-CONFIG.md MN-MC-CR-004). Two separate attendee
      relationships (rather than one with a role field) per
      SES-DEC-009 enables clean filtering and reporting by
      attendee role. See PRD MN-ENGAGE-DAT-035.
    entity: Session
    entityForeign: Contact
    linkType: manyToMany
    link: clientAttendees
    linkForeign: sessionsAsClientAttendee
    relationName: sessionClientAttendees
    label: "Client Attendees"
    labelForeign: "Sessions (as Client Attendee)"
    audited: false

  - name: sessionRescheduledFrom
    description: >
      Self-referential link to the original Session record that
      was rescheduled. Populated automatically by the rescheduling
      workflow (post-deployment — MANUAL-CONFIG.md MN-MC-AA-011).
      Empty on normally scheduled sessions. Enables tracing the
      full rescheduling chain. Per SES-DEC-007.
    entity: Session
    entityForeign: Session
    linkType: manyToOne
    link: rescheduledFromSession
    linkForeign: rescheduledToSessions
    label: "Rescheduled From"
    labelForeign: "Rescheduled To"
    audited: false

        category: "Mentoring Context"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

      - name: currentTopChallenges
        type: text
        label: "Current Top Challenges"
        description: >
          What is keeping the owner up at night. Surfaces the highest-leverage mentoring topics.
        category: "Mentoring Context"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

      - name: priorMentoringReceived
        type: bool
        label: "Previously Received Business Mentoring"
        description: >
          Whether the owner has worked with a business mentor before.
        category: "Mentoring Context"
        required: false
        default: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

      - name: priorMentoringSources
        type: multiEnum
        label: "Prior Mentoring Sources"
        description: >
          Where the owner has received business mentoring before.
        category: "Mentoring Context"
        required: false
        options:
          - "SCORE"
          - "Small Business Development Center (SBDC)"
          - "Women's Business Center"
          - "Veterans Business Outreach Center"
          - "Minority Business Development Agency"
          - "Private Coach or Consultant"
          - "Industry Association"
          - "Other Nonprofit"
          - "Other"
        visibleWhen:
          all:
            - { field: accountType, op: contains, value: "Client" }
            - { field: priorMentoringReceived, op: equals, value: true }

      - name: priorBusinessTrainingNotes
        type: text

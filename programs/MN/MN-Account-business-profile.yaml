        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

      - name: willingToProvideTestimonial
        type: bool
        label: "Willing to Provide a Testimonial Later"
        description: >
          Whether the client has indicated willingness to provide a testimonial about CBM in the future.
        category: "Mentoring Context"
        required: false
        default: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

      - name: willingToParticipateInCbmEvents
        type: bool
        label: "Willing to Participate in CBM Events"
        description: >
          Whether the client has indicated willingness to attend or participate in CBM-hosted events.
        category: "Mentoring Context"
        required: false
        default: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

      - name: businessProfileLastReviewed
        type: date
        label: "Business Profile Last Reviewed"
        description: >
          Date the assigned mentor most recently reviewed and updated the Client Business Profile fields with the client. Supports a saved-view filter that surfaces records older than N months for periodic-review nudges. Many fields in this profile (currentlyHiring, currentlySeekingCapital, bookkeepingStatus, revenueTrend, and similar state fields) drift month over month; this field provides the freshness signal mentors and administrators need to keep the record current. Added in v1.1.0 / PRD v1.11 to close F4 from the pre-Phase-8 review pass.
        category: "Mentoring Context"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

    layout:

      detail:
        panels:

          - label: "Identity and Legal"
            description: >
              Legal formation, registration, and compliance foundations. Visible only when accountType has Client.
            visibleWhen:
              - { field: accountType, op: contains, value: "Client" }
            tabs:
              - label: "Identity and Legal"
                category: "Identity and Legal"

          - label: "Ownership and Certifications"
            description: >
              Aggregate ownership composition driving certification eligibility and the certifications currently held or sought.
            visibleWhen:
              - { field: accountType, op: contains, value: "Client" }
            tabs:
              - label: "Ownership and Control"
                category: "Ownership and Control"
              - label: "Certifications"
                category: "Certifications"

          - label: "Classification"
            description: >
              Industry classification at NAICS resolution.
            visibleWhen:
              - { field: accountType, op: contains, value: "Client" }
            tabs:
              - label: "Industry Classification"
                category: "Industry Classification"

          - label: "Financials"
            description: >
              Scale, revenue, profitability, and fiscal calendar.
            visibleWhen:
              - { field: accountType, op: contains, value: "Client" }
            tabs:
              - label: "Financials"
                category: "Financials"
              - label: "Financial Infrastructure"
                category: "Financial Infrastructure"
              - label: "Funding and Capital"
                category: "Funding and Capital"

          - label: "Workforce"
            description: >
              Employees, contractors, union status, and labor relations.
            visibleWhen:
              - { field: accountType, op: contains, value: "Client" }
            tabs:
              - label: "Workforce"
                category: "Workforce"

          - label: "Customers and Markets"
            description: >
              Who the business sells to and where.
            visibleWhen:
              - { field: accountType, op: contains, value: "Client" }
            tabs:
              - label: "Customers and Markets"
                category: "Customers and Markets"
              - label: "Sales and Marketing"
                category: "Sales and Marketing"

          - label: "Operations"
            description: >
              Physical and operational footprint of the business.
            visibleWhen:
              - { field: accountType, op: contains, value: "Client" }
            tabs:
              - label: "Operations"
                category: "Operations"
              - label: "Technology"
                category: "Technology"

          - label: "Advisors and Insurance"
            description: >
              Existing professional relationships and risk coverage.
            visibleWhen:
              - { field: accountType, op: contains, value: "Client" }
            tabs:
              - label: "Professional Advisors"
                category: "Professional Advisors"
              - label: "Insurance and Compliance"
                category: "Insurance and Compliance"

          - label: "Mentoring Context"
            description: >
              Goals, challenges, prior mentoring history, and preferences that inform how CBM mentors engage.
            visibleWhen:
              - { field: accountType, op: contains, value: "Client" }
            tabs:
              - label: "Mentoring Context"
                category: "Mentoring Context"


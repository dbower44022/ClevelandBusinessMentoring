version: "1.0"
content_version: "1.0.0"
description: >
  Mentoring (MN) domain — native Contact entity declaration. The MN
  domain consumes Contact in four roles via Engagement relationships
  (assignedMentor, primaryEngagementContact, engagementContacts,
  additionalMentors) and a fifth role via Session relationships
  (mentorAttendees, clientAttendees) — but introduces no MN-only
  custom fields on Contact beyond what already exists in the
  shared/MR-domain Contact PRD definition. The "Client" value of
  contactType (declared in MR-Contact.yaml as part of the
  multi-valued discriminator) is used for client contacts created by
  MN-INTAKE. All Engagement-side and Session-side relationships to
  Contact are declared in MN-Engagement.yaml and MN-Session.yaml,
  respectively, not here. This file exists to document the MN
  domain's read/use stance on Contact and to keep parity with the
  Phase 9 expected-outputs list. See EXCEPTIONS.md MN-Y9-EXC-001.

# Source: Mentoring Domain Product Requirements Document v1.0
#         (04-01-26), Sections 4 (Data Reference). Contact Entity
#         Product Requirements Document v1.7 — confirms client
#         contact native fields (firstName, lastName, middleName,
#         emailAddress, phoneNumber, addressPostalCode for Zip Code,
#         linkedInProfile [shared], preferredName [shared]) and
#         confirms Primary Contact is a relationship-level bool, not
#         a Contact field (CON-DEC-001).

entities:

  ClientProfile:
    description: >
      Individual mentoring meetings within an Engagement. Created
      and managed during MN-ENGAGE. Uses the Event type, so
      dateStart (= Session Date/Time), dateEnd (calculated as
      dateStart + duration; read-only), duration (minutes),
      status (custom seven-value enum), and parent (link to
      Engagement) are inherited per SES decisions 1–3, 8.
      Activity stream enabled per Session Entity PRD Section 1.
      Auto-generated name "{Engagement Name} — {Session Date}" is
      implemented via post-deployment automation per SES-DEC-004
      (see MANUAL-CONFIG.md MN-MC-AA-007). The first Session
      reaching Completed status auto-transitions the parent
      Engagement to Active per MN-ENGAGE-REQ-001 — implemented
      via post-deployment automation (MANUAL-CONFIG.md
      MN-MC-AA-008). Mentor / Client attendee minimum-of-one
      enforcement at Completed status is implemented via
      post-deployment workflow validation per Session Entity PRD
      Implementation Note 8 (MANUAL-CONFIG.md MN-MC-AA-009).
    action: create
    type: Base
    settings:
      labelSingular: "Client"
      labelPlural: "Clients"
      stream: true
      disabled: false
      # Session.name is auto-generated by post-deployment automation
      # (SES-DEC-004 — "{Engagement Name} — {Session Date}"). Until that
      # automation is in place, leave autoPlaceName at the default true
      # so the user can supply name manually if needed at create time.

    fields:

      # --- Section 3.1 — Session Detail Fields ---

      - name: industrySector
        type: enum
        label: "Industry Sector"
        description: >
          Primary NAICS top-level industry sector. 20 standard
          United States Census Bureau NAICS two-digit sector titles
          per MR-Y9-EXC-001 (cross-entity alignment requirement —
          values match Mentor Contact.industrySectors). Drives the
          Industry Subsector dependent filter. Visible only when
          accountType has Client. See PRD MN-INTAKE-DAT-006.
        category: "Client Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }
        options:
          - "Agriculture, Forestry, Fishing and Hunting"
          - "Mining, Quarrying, and Oil and Gas Extraction"
          - "Utilities"
          - "Construction"
          - "Manufacturing"
          - "Wholesale Trade"
          - "Retail Trade"
          - "Transportation and Warehousing"
          - "Information"
          - "Finance and Insurance"
          - "Real Estate and Rental and Leasing"
          - "Professional, Scientific, and Technical Services"
          - "Management of Companies and Enterprises"
          - "Administrative and Support and Waste Management"
          - "Educational Services"
          - "Health Care and Social Assistance"
          - "Arts, Entertainment, and Recreation"
          - "Accommodation and Food Services"
          - "Other Services (except Public Administration)"
          - "Public Administration"

      - name: clientRace
        type: enum
        label: "Client Race"
        description: >
          Primary NAICS top-level industry sector. 20 standard
          United States Census Bureau NAICS two-digit sector titles
          per MR-Y9-EXC-001 (cross-entity alignment requirement —
          values match Mentor Contact.industrySectors). Drives the
          Industry Subsector dependent filter. Visible only when
          accountType has Client. See PRD MN-INTAKE-DAT-006.
        category: "Client Profile"
        required: false
        options:
          - ""
          - "American Indian or Alaska Native"
          - "Asian"
          - "Black or African American"
          - "Native Hawaiin or Other Pacific Islander"
          - "White"

      - name: clientEthnicity
        type: enum
        label: "Client Ethnicity"
        description: >
          Primary NAICS top-level industry sector. 20 standard
          United States Census Bureau NAICS two-digit sector titles
          per MR-Y9-EXC-001 (cross-entity alignment requirement —
          values match Mentor Contact.industrySectors). Drives the
          Industry Subsector dependent filter. Visible only when
          accountType has Client. See PRD MN-INTAKE-DAT-006.
        category: "Client Profile"
        required: false
        options:
          - ""
          - "Hispanic or Latino"
          - "Not Hispanic or Latino"

      - name: clientVeteranStatus
        type: enum
        label: "Veteran Status"
        description: >
          Primary NAICS top-level industry sector. 20 standard
          United States Census Bureau NAICS two-digit sector titles
          per MR-Y9-EXC-001 (cross-entity alignment requirement —
          values match Mentor Contact.industrySectors). Drives the
          Industry Subsector dependent filter. Visible only when
          accountType has Client. See PRD MN-INTAKE-DAT-006.
        category: "Client Profile"
        required: false
        options:
          - ""
          - "No military, Reserver, or National Guard service"
          - "Veteran"
          - "Service Disabled Veteran"
          - "Active Duty"
          - "Member of Reserve"
          - "Member of National Guard"
          - "Spouse of Military Member"

      
      - name: legalEntityType
        type: enum
        label: "Legal Entity Type"
        description: >
          The legal form under which the business is organized.
          Aligned with SBA Form 641 question 29 with additional
          Ohio-relevant values (B-Corp, Cooperative).
        category: "Identity and Legal"
        required: false
        options:
          - "Sole Proprietorship"
          - "General Partnership"
          - "Limited Partnership"
          - "Limited Liability Partnership (LLP)"
          - "Limited Liability Company (LLC)"
          - "S-Corporation"
          - "C-Corporation"
          - "Nonprofit Corporation"
          - "Benefit Corporation (B-Corp)"
          - "Cooperative"
          - "Not Yet Formed"
          - "Other"


      - name: stateOfFormation
        type: varchar
        label: "State of Formation"
        description: >
          Two-letter state code for the state in which the
          business is legally formed. Often Ohio for CBM clients
          but some businesses incorporate elsewhere (commonly
          Delaware) while operating in Ohio.
        category: "Identity and Legal"
        required: false
        maxLength: 2
        
      - name: formationDate
        type: date
        label: "Formation Date"
        description: >
          The date the business was legally formed.
        category: "Identity and Legal"
        required: false
     
      - name: yearFounded
        type: int
        label: "Year Founded"
        description: >
          The year the owner considers the business to have
          started, which may predate legal formation.
        category: "Identity and Legal"
        required: false
        min: 1900
        max: 2099
  
 
      - name: federalEinOnFile
        type: bool
        label: "Federal EIN Obtained"
        description: >
          Whether the business has obtained a federal Employer
          Identification Number. The number itself is not
          captured; the flag is sufficient for mentoring
          purposes.
        category: "Identity and Legal"
        required: false
        default: false
  
 
      - name: ohioVendorsLicenseOnFile
        type: bool
        label: "Ohio Vendor's License Obtained"
        description: >
          Ohio requires a vendor's license for businesses selling
          taxable goods or services.
        category: "Identity and Legal"
        required: false
        default: false
     
 
      - name: registeredOnSamGov
        type: bool
        label: "Registered on SAM.gov"
        description: >
          SAM.gov registration is the gateway to federal
          contracting. Flags whether the client is positioned
          for government contract work.
        category: "Identity and Legal"
        required: false
        default: false
 
 
      - name: localLicensesAndPermits
        type: text
        label: "Local Licenses and Permits Held"
        description: >
          Free-text list of city, county, and industry-specific
          licenses (contractor's license, food service permit,
          professional licenses, etc.).
        category: "Identity and Legal"
        required: false
    
 
      - name: annualRevenueRange
        type: enum
        label: "Annual Revenue Range"
        description: >
          Bracketed annual revenue range. Bracketed rather than
          exact to lower the disclosure threshold for clients
          who are reluctant to share precise numbers.
        category: "Financials"
        required: false
        options:
          - "Pre-Revenue"
          - "Under $50,000"
          - "$50,000 to $100,000"
          - "$100,000 to $250,000"
          - "$250,000 to $500,000"
          - "$500,000 to $1 Million"
          - "$1 Million to $2 Million"
          - "$2 Million to $5 Million"
          - "$5 Million to $10 Million"
          - "Over $10 Million"
          - "Prefer Not to Share"

      # ===============================================================
      # Category: Government and Industry Certifications
      # ===============================================================
      # STRUCTURAL DECISION FLAGGED: Certifications could be a
      # separate Certification entity with per-record fields for
      # issuing body, certificate number, issue date, expiration
      # date, and status. The flat-multiEnum approach below is the
      # lighter-weight alternative.

      - name: certificationsHeld
        type: multiEnum
        label: "Certifications Currently Held"
        description: >
          Federal, state, and county certifications the business
          currently holds. Drives mentor matching and informs the
          client's contracting opportunities. See inventory file
          for the structural alternative.
        category: "Certifications"
        required: false
        options:
          - "SBA 8(a) Business Development"
          - "SBA Women-Owned Small Business (WOSB)"
          - "SBA Economically Disadvantaged WOSB (EDWOSB)"
          - "SBA Veteran-Owned Small Business (VOSB)"
          - "SBA Service-Disabled VOSB (SDVOSB)"
          - "SBA HUBZone"
          - "SBA Small Disadvantaged Business (SDB)"
          - "Federal Disadvantaged Business Enterprise (DBE)"
          - "Ohio Minority Business Enterprise (MBE)"
          - "Ohio Women Business Enterprise (WBE)"
          - "Ohio Encouraging Diversity, Growth and Equity (EDGE)"
          - "Ohio Veteran-Friendly Business Enterprise (VFBE)"
          - "Cuyahoga County MBE"
          - "Cuyahoga County WBE"
          - "Cuyahoga County SBE"
          - "Other"
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }


      - name: revenueTrend
        type: enum
        label: "Revenue Trend (last 12 months)"
        description: >
          Direction of revenue change over the past year.
          Direction often matters more than absolute value for
          mentoring conversations.
        category: "Financials"
        required: false
        options:
          - "Growing Significantly"
          - "Growing Modestly"
          - "Flat"
          - "Declining Modestly"
          - "Declining Significantly"
          - "Too New to Tell"
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

      - name: profitabilityStatus
        type: enum
        label: "Profitability Status"
        description: >
          Whether the business is currently making money.
          Directly relevant to mentoring focus area.
        category: "Financials"
        required: false
        options:
          - "Profitable"
          - "Breakeven"
          - "Operating at a Loss"
          - "Owner Draws Only (No Formal Profit)"
          - "Pre-Revenue"
          - "Prefer Not to Share"
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

      - name: mostRecentFullYearRevenue
        type: currency
        label: "Most Recent Full Year Revenue"
        description: >
          Optional exact revenue figure. Captured when the client
          is willing to share precise numbers. Aligned with
          SBA Form 641 question 28.
        category: "Financials"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }

      - name: fiscalYearEndMonth
        type: enum
        label: "Fiscal Year End"
        description: >
          The month in which the business closes its fiscal
          year. Most small businesses use a calendar year.
        category: "Financials"
        required: false
        options:
          - "January"
          - "February"
          - "March"
          - "April"
          - "May"
          - "June"
          - "July"
          - "August"
          - "September"
          - "October"
          - "November"
          - "December"
        visibleWhen:
          - { field: accountType, op: contains, value: "Client" }


 

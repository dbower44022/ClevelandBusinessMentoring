version: "1.0"
content_version: "1.0.0"
description: >
  Mentoring (MN) domain — Partner-conditional custom fields on the
  native Account entity. Five fields: partnershipType,
  partnershipStartDate, partnershipAgreementDate,
  partnerContactCadence, partnerNotes. All five are visible only
  when accountType has Partner per Account Entity PRD v1.8 dynamic-
  logic conventions. The accountType discriminator is declared in
  CR-Account.yaml; this file depends on the "Partner" value being
  present in that option list.

  These are placeholder field shapes pending an MN Domain PRD section
  on Partner data requirements. The set was extracted from
  MN-Account.yaml when the Sponsor/Partner accountType-conditional
  fields were split into per-relationship-flavor files. The specific
  field names and option values are likely to change once the PRD
  lands; the load-bearing methodology element is the accountType
  conditional discipline (every field gates on `accountType contains
  "Partner"`).

  SPLIT-NOTE: This file declares fields ONLY. The Account detail
  layout is owned exclusively by MN-Account.yaml. Partner fields
  exist on the Account entity after this file deploys but are not
  placed on a labeled layout panel by YAML. An operator post-deploy
  step adds a Partner Profile panel via the EspoCRM Layout Manager,
  OR the operator folds those panels back into MN-Account.yaml's
  layout block. The engine does not currently merge layouts across
  files (EspoCRM stores one detail layout per entity, PUT replaces)
  so split-file layouts are not viable until cross-file layout
  aggregation is added to the engine.

# Source: Mentoring Domain Product Requirements Document v1.0
#         (04-01-26), Section 4 (Partner Organization — scaffolding
#         pending real PRD section). Account Entity Product
#         Requirements Document v1.8 Section 3.3 pattern.

entities:

  Account:
    description: >
      Native Company-type entity. This file contributes Partner-
      conditional custom fields only. Client-conditional fields and
      the Account detail layout are in MN-Account.yaml; Sponsor-
      conditional fields are in MN-Sponsor.yaml. The accountType
      discriminator value list (which must include "Partner") is
      owned by CR-Account.yaml.

    fields:

      - name: partnershipType
        type: enum
        label: "Partnership Type"
        description: >
          Nature of the organization's partnership relationship with
          CBM. Drives partner reporting categories. Visible only
          when accountType has Partner.
        category: "Partner Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Partner" }
        options:
          - "Referral Partner"
          - "Training Partner"
          - "Community Partner"
          - "Service Partner"
          - "Funding Partner"

      - name: partnershipStartDate
        type: date
        label: "Partnership Start Date"
        description: >
          Date the current partnership relationship began. Visible
          only when accountType has Partner.
        category: "Partner Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Partner" }

      - name: partnershipAgreementDate
        type: date
        label: "Partnership Agreement Date"
        description: >
          Date the formal partnership agreement / MOU was signed.
          Drives compliance reports and renewal tracking. Visible
          only when accountType has Partner.
        category: "Partner Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Partner" }

      - name: partnerContactCadence
        type: enum
        label: "Partner Contact Cadence"
        description: >
          How frequently CBM staff are expected to engage with this
          partner organization. Drives relationship-management
          reporting and reminder workflows. Visible only when
          accountType has Partner.
        category: "Partner Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Partner" }
        options:
          - "Monthly"
          - "Quarterly"
          - "Semi-Annually"
          - "Annually"
          - "As-Needed"

      - name: partnerNotes
        type: wysiwyg
        label: "Partner Notes"
        description: >
          Rich-text notes specific to the partner relationship.
          Field-level access control restricted to Client
          Administrator and above per the same Account Entity PRD
          v1.8 Implementation Note pattern used by clientNotes;
          configured post-deployment. Visible only when accountType
          has Partner.
        category: "Partner Profile"
        required: false
        visibleWhen:
          - { field: accountType, op: contains, value: "Partner" }
